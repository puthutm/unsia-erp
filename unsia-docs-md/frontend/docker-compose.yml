version: '3.8'

services:
  unsia-core-web:
    build:
      context: ./unsia-core
      dockerfile: Dockerfile
    container_name: unsia-core-web
    restart: always
    ports:
      - "3001:3001"
    networks:
      - unsia-network

  unsia-reference-web:
    build:
      context: ./unsia-reference
      dockerfile: Dockerfile
    container_name: unsia-reference-web
    restart: always
    ports:
      - "3002:3002"
    networks:
      - unsia-network

  unsia-pmb-web:
    build:
      context: ./unsia-pmb
      dockerfile: Dockerfile
    container_name: unsia-pmb-web
    restart: always
    ports:
      - "3003:3003"
    networks:
      - unsia-network

  unsia-academic-web:
    build:
      context: ./unsia-academic
      dockerfile: Dockerfile
    container_name: unsia-academic-web
    restart: always
    ports:
      - "3004:3004"
    networks:
      - unsia-network

  unsia-finance-web:
    build:
      context: ./unsia-finance
      dockerfile: Dockerfile
    container_name: unsia-finance-web
    restart: always
    ports:
      - "3005:3005"
    networks:
      - unsia-network

  unsia-lms-web:
    build:
      context: ./unsia-lms
      dockerfile: Dockerfile
    container_name: unsia-lms-web
    restart: always
    ports:
      - "3006:3006"
    networks:
      - unsia-network

  unsia-assessment-web:
    build:
      context: ./unsia-assessment
      dockerfile: Dockerfile
    container_name: unsia-assessment-web
    restart: always
    ports:
      - "3007:3007"
