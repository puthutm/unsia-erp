      - unsia-network

  unsia-hris-web:
    build:
      context: ./unsia-hris
      dockerfile: Dockerfile
    container_name: unsia-hris-web
    restart: always
    ports:
      - "3008:3008"
    networks:
      - unsia-network

  unsia-crm-web:
    build:
      context: ./unsia-crm
      dockerfile: Dockerfile
    container_name: unsia-crm-web
    restart: always
    ports:
      - "3009:3009"
