      DATABASE_URL: "postgres://postgres:postgres@tcp(unsia-postgres:5432)/finance_db?charset=utf8mb4&parseTime=True&loc=local"
      DB_HOST: "unsia-postgres"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      DB_NAME: "finance_db"
      REDIS_URL: "redis://unsia-redis:6379"
      RABBITMQ_URL: "amqp://unsia:unsia@unsia-rabbitmq:5672"
      CORE_SERVICE_URL: "http://unsia-core-service:8001"
      REFERENCE_SERVICE_URL: "http://unsia-reference-service:8002"
    ports:
      - "8005:8005"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - unsia-network

  # ==========================================
  # LMS SERVICE - Port 8006
  # ==========================================
  unsia-lms-service:
    build:
      context: ../../
      dockerfile: services/unsia-lms-service/Dockerfile
    container_name: unsia-lms-service
    restart: always
    environment:
      PORT: "8006"
      DATABASE_URL: "postgres://postgres:postgres@tcp(unsia-postgres:5432)/lms_db?charset=utf8mb4&parseTime=True&loc=local"
      DB_HOST: "unsia-postgres"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      DB_NAME: "lms_db"
      REDIS_URL: "redis://unsia-redis:6379"
      RABBITMQ_URL: "amqp://unsia:unsia@unsia-rabbitmq:5672"
      CORE_SERVICE_URL: "http://unsia-core-service:8001"
      REFERENCE_SERVICE_URL: "http://unsia-reference-service:8002"
