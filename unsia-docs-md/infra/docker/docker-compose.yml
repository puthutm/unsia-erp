networks:
  unsia-network:
    name: unsia-network
    driver: bridge

volumes:
  pgdata_local:
    driver: local
  redisdata_local:
    driver: local
  rabbitdata_local:
    driver: local
  core-keys:
    driver: local
  portainer_data:
    driver: local
