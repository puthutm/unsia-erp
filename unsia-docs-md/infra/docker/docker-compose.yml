version: '3.8'

services:
  # ==========================================
  # INFRASTRUCTURE SERVICES
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: unsia-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data
      - ../postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    networks:
      - unsia-network

  redis:
    image: redis:7-alpine
    container_name: unsia-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata_local:/data
    networks:
      - unsia-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: unsia-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: unsia
      RABBITMQ_DEFAULT_PASS: unsia
    volumes:
      - ../rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ../rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - rabbitdata_local:/var/lib/rabbitmq
    networks:
      - unsia-network

  # ==========================================
  # PORTAINER - Docker Management UI
  # ==========================================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: unsia-portainer
    restart: always
    ports:
      - "9443:9443"
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - unsia-network

  # ==========================================
  # CORE SERVICE - Port 8001
  # ==========================================
  unsia-core-service:
    build:
      context: ../../
      dockerfile: services/unsia-core-service/Dockerfile
    container_name: unsia-core-service
    restart: always
    environment:
      PORT: "8001"
      DATABASE_URL: "postgres://postgres:postgres@tcp(unsia-postgres:5432)/core_db?charset=utf8mb4&parseTime=True&loc=local"
      DB_HOST: "unsia-postgres"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      DB_NAME: "core_db"
      REDIS_URL: "redis://unsia-redis:6379"
      RABBITMQ_URL: "amqp://unsia:unsia@unsia-rabbitmq:5672"
      JWKS_URL: "http://localhost:8001/.well-known/jwks.json"
      RSA_PRIVATE_KEY_PATH: "/app/keys/private.pem"
      RSA_PUBLIC_KEY_PATH: "/app/keys/public.pem"
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    volumes:
      - core-keys:/app/keys
    networks:
      - unsia-network

  # ==========================================
  # REFERENCE SERVICE - Port 8002
  # ==========================================
  unsia-reference-service:
    build:
      context: ../../
      dockerfile: services/unsia-reference-service/Dockerfile
    container_name: unsia-reference-service
    restart: always
    environment:
      PORT: "8002"
      DATABASE_URL: "postgres://postgres:postgres@tcp(unsia-postgres:5432)/reference_db?charset=utf8mb4&parseTime=True&loc=local"
      DB_HOST: "unsia-postgres"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      DB_NAME: "reference_db"
      REDIS_URL: "redis://unsia-redis:6379"
      CORE_SERVICE_URL: "http://unsia-core-service:8001"
    ports:
      - "8002:8002"
    depends_on:
      - postgres
      - redis
    networks:
      - unsia-network

  # ==========================================
  # PMB SERVICE - Port 8003
  # ==========================================
  unsia-pmb-service:
    build:
      context: ../../
      dockerfile: services/unsia-pmb-service/Dockerfile
    container_name: unsia-pmb-service
    restart: always
    environment:
      PORT: "8003"
      DATABASE_URL: "postgres://postgres:postgres@tcp(unsia-postgres:5432)/pmb_db?charset=utf8mb4&parseTime=True&loc=local"
      DB_HOST: "unsia-postgres"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      DB_NAME: "pmb_db"
      REDIS_URL: "redis://unsia-redis:6379"
      RABBITMQ_URL: "amqp://unsia:unsia@unsia-rabbitmq:5672"
      CORE_SERVICE_URL: "http://unsia-core-service:8001"
      REFERENCE_SERVICE_URL: "http://unsia-reference-service:8002"
    ports:
      - "8003:8003"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - unsia-network

  # ==========================================
  # ACADEMIC SERVICE - Port 8004
  # ==========================================
  unsia-academic-service:
    build:
      context: ../../
      dockerfile: services/unsia-academic-service/Dockerfile
    container_name: unsia-academic-service
    restart: always
    environment:
      PORT: "8004"
      DATABASE_URL: "postgres://postgres:postgres@tcp(unsia-postgres:5432)/academic_db?charset=utf8mb4&parseTime=True&loc=local"
      DB_HOST: "unsia-postgres"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      DB_NAME: "academic_db"
      REDIS_URL: "redis://unsia-redis:6379"
      RABBITMQ_URL: "amqp://unsia:unsia@unsia-rabbitmq:5672"
      CORE_SERVICE_URL: "http://unsia-core-service:8001"
      REFERENCE_SERVICE_URL: "http://unsia-reference-service:8002"
      FINANCE_SERVICE_URL: "http://unsia-finance-service:8005"
    ports:
      - "8004:8004"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - unsia-network

  # ==========================================
  # FINANCE SERVICE - Port 8005
  # ==========================================
  unsia-finance-service:
    build:
      context: ../../
      dockerfile: services/unsia-finance-service/Dockerfile
    container_name: unsia-finance-service
