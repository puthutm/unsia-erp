      DATABASE_URL: "postgres://postgres:postgres@tcp(unsia-postgres:5432)/portal_db?charset=utf8mb4&parseTime=True&loc=local"
      DB_HOST: "unsia-postgres"
      DB_PORT: "5432"
      DB_USER: "postgres"
