      DATABASE_URL: "postgres://postgres:postgres@tcp(unsia-postgres:5432)/hris_db?charset=utf8mb4&parseTime=True&loc=local"
      DB_HOST: "unsia-postgres"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      DB_NAME: "hris_db"
      REDIS_URL: "redis://unsia-redis:6379"
      RABBITMQ_URL: "amqp://unsia:unsia@unsia-rabbitmq:5672"
