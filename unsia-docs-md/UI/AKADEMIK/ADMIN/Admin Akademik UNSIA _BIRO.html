  <script type="text/babel">
// siakad/screen-learning.jsx — Learning Material (monitoring upload progress)

function ScreenLearning() {
  const { programs } = window.SIAKAD_DATA;
  const [prodi, setProdi] = useState("Semua");
  const [search, setSearch] = useState("");
  const [detailMK, setDetailMK] = useState(null);

  // Generate per-MK learning material data (16 meetings)
  // Each meeting has: nama materi, count of materi files, video count, tugas count
  const buildSesi = (seed, totalSesi = 16, dropoff = 0.6) => {
    const titles = [
      "Pengantar & Kontrak Kuliah",
      "Konsep Dasar",
      "Studi Kasus & Eksplorasi",
      "Metodologi I",
      "Metodologi II",
      "Latihan Praktik I",
      "Review Materi",
      "Ujian Tengah Semester",
      "Pendalaman Topik",
      "Studi Lapangan",
      "Latihan Praktik II",
      "Diskusi Kelompok",
      "Proyek Mini I",
      "Proyek Mini II",
      "Presentasi Akhir",
      "Ujian Akhir Semester",
    ];
    return Array.from({length: totalSesi}, (_, i) => {
      const r = ((seed * (i + 7)) % 100) / 100;
      const isUploaded = r > (1 - dropoff);
      return {
        sesi: i + 1,
        nama: titles[i],
        materi: isUploaded ? Math.floor(((seed + i) * 3) % 5) + 1 : 0,    // 1-5 files
        video:  isUploaded ? (((seed + i * 2) % 3) === 0 ? 0 : Math.floor(((seed + i) % 3) + 1)) : 0, // 0-3
        tugas:  isUploaded && i % 3 !== 1 ? Math.floor(((seed + i) % 2) + 1) : 0, // 0-2
      };
    });
  };

  // Compute completeness % per MK: each session needs at least 1 materi & 1 video & 1 tugas (if applicable)
  // simplified: (sesi yang ada materi >= 1) / total sesi
  const courses = useMemo(() => {
    return window.SIAKAD_DATA.courses.map((c, i) => {
      const sesi = buildSesi(c.code.charCodeAt(2) + i, 16, 0.55 + (i * 0.04) % 0.4);
      const filled = sesi.filter(s => s.materi > 0 || s.video > 0 || s.tugas > 0).length;
      const pct = (filled / sesi.length) * 100;
      return { ...c, sesi, pct, filled };
    });
  }, []);

  const filtered = useMemo(() => {
    let r = courses;
    if (prodi !== "Semua") r = r.filter(c => c.prodi === prodi);
    if (search) {
      const t = search.toLowerCase();
      r = r.filter(c => c.code.toLowerCase().includes(t) || c.name.toLowerCase().includes(t) || c.dosen.toLowerCase().includes(t));
    }
    return r;
  }, [courses, prodi, search]);

  // KPIs
  const avgPct = filtered.length ? filtered.reduce((s, c) => s + c.pct, 0) / filtered.length : 0;
  const fullyUploaded = filtered.filter(c => c.pct >= 100).length;
  const lacking = filtered.filter(c => c.pct < 75).length;
  const totalFiles = filtered.reduce((s, c) =>
    s + c.sesi.reduce((a, x) => a + x.materi + x.video + x.tugas, 0), 0);

  return (
    <>
      <PageHd
        eyebrow={PAGE_TITLES.learning.eyebrow}
        title={PAGE_TITLES.learning.title}
        lede={PAGE_TITLES.learning.lede}
      >
        <button className="btn"><Icon name="refresh" size={14}/>Sinkron LMS</button>
        <button className="btn"><Icon name="download" size={14}/>Excel</button>
        <button className="btn primary"><Icon name="download" size={14}/>PDF</button>
      </PageHd>

      <div className="kpi-grid" style={{gridTemplateColumns:"repeat(4, 1fr)", marginBottom:24}}>
        <KpiSmall2 label="Rata-rata kelengkapan"  value={`${avgPct.toFixed(1)}%`} sub="dari 16 sesi/MK" accent="ok"/>
        <KpiSmall2 label="MK lengkap"             value={fullyUploaded}           sub="100% terisi"  accent="gold"/>
        <KpiSmall2 label="MK perlu tindakan"      value={lacking}                  sub="< 75% terisi · ingatkan dosen" accent="warn"/>
        <KpiSmall2 label="Total file LMS"         value={totalFiles.toLocaleString("id-ID")} sub="Materi + Video + Tugas" accent="navy"/>
      </div>

      <Card
        title="Status Learning Material — per mata kuliah"
        sub="Periode 2026/2027 Ganjil · 16 pertemuan per mata kuliah"
        action={
          <>
            <input className="input search" placeholder="Cari MK / dosen…"
                   value={search} onChange={e => setSearch(e.target.value)} style={{minWidth: 220}}/>
            <select className="select" value={prodi} onChange={e => setProdi(e.target.value)}>
              <option>Semua</option>
              {programs.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </>
        }
        tight
      >
        <div className="tbl-wrap">
          <table className="tbl">
            <thead>
              <tr>
                <th>Kode</th>
                <th>Mata Kuliah</th>
                <th>Dosen Pengampu</th>
                <th style={{textAlign: "right", minWidth: 220}}>Status Learning Material</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(c => {
                const tone = c.pct >= 100 ? "ok" : c.pct >= 75 ? "gold" : c.pct >= 50 ? "warn" : "err";
                const txtTone = c.pct >= 100 ? "var(--ok)" : c.pct >= 75 ? "var(--gold-700)" : c.pct >= 50 ? "var(--warn)" : "var(--err)";
                return (
                  <tr key={c.code}>
                    <td className="mono">{c.code}</td>
                    <td>
                      <div style={{fontWeight: 500}}>{c.name}</div>
                      <div className="muted" style={{fontSize: 11.5, marginTop: 2}}>
                        {programs.find(p => p.id === c.prodi)?.name || "MKU"} · {c.filled}/16 sesi terisi
                      </div>
                    </td>
                    <td className="muted" style={{fontSize: 12.5}}>{c.dosen}</td>
                    <td>
                      <div className="row-flex" style={{gap: 12, justifyContent: "flex-end"}}>
                        <div className="bar" style={{width: 140, height: 8}}>
                          <i className={tone} style={{width: c.pct + "%"}}/>
                        </div>
                        <span className="mono" style={{fontWeight: 700, fontSize: 14, color: txtTone, minWidth: 56, textAlign: "right"}}>
                          {c.pct.toFixed(1)}%
                        </span>
                      </div>
                    </td>
                    <td>
                      <button className="btn sm" onClick={() => setDetailMK(c)}>
                        <Icon name="list" size={12}/>Detail Sesi
                      </button>
                    </td>
                  </tr>
                );
              })}
              {filtered.length === 0 && (
                <tr><td colSpan={5} style={{textAlign:"center", padding:"40px", color:"var(--muted)"}}>
                  Tidak ada mata kuliah yang cocok dengan filter.
                </td></tr>
              )}
            </tbody>
          </table>
        </div>
      </Card>

      {detailMK && <LearningDetailModal mk={detailMK} onClose={() => setDetailMK(null)}/>}
    </>
  );
}

function LearningDetailModal({ mk, onClose }) {
  const totalM = mk.sesi.reduce((s, x) => s + x.materi, 0);
  const totalV = mk.sesi.reduce((s, x) => s + x.video, 0);

  return (
    <Modal
      title={`Learning Material — ${mk.name}`}

      onClose={onClose}
      width={960}
      footer={
        <>
          <span className="muted" style={{fontSize: 12, marginRight: "auto"}}>
            Total: {totalM} materi · {totalV} video · {totalT} tugas
          </span>
          <button className="btn ghost" onClick={onClose}>Tutup</button>
          <button className="btn"><Icon name="download" size={14}/>Export Excel</button>
          <button className="btn primary"><Icon name="download" size={14}/>Export PDF</button>
        </>
      }
    >
      <div className="tbl-wrap" style={{maxHeight: "60vh", overflow: "auto", border: "1px solid var(--line)", borderRadius: 12}}>
        <table className="tbl" style={{fontSize: 13}}>
          <thead style={{position: "sticky", top: 0, zIndex: 1}}>
            <tr>
              <th style={{width: 70}}>Sesi</th>
              <th>Nama Materi</th>
              <th style={{textAlign: "right"}}>Materi</th>
              <th style={{textAlign: "right"}}>Video</th>
              <th style={{textAlign: "right"}}>Tugas</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            {mk.sesi.map(s => {
              const hasAny = s.materi > 0 || s.video > 0 || s.tugas > 0;
              return (
                <tr key={s.sesi}>
                  <td>
                    <div style={{
                      display: "inline-grid", placeItems: "center",
                      width: 32, height: 32, borderRadius: 8,
                      background: hasAny ? "var(--navy-700)" : "var(--paper-2)",
                      color: hasAny ? "#fff" : "var(--muted)",
                      fontFamily: "var(--ff-display)", fontWeight: 700, fontSize: 13,
                    }}>{s.sesi}</div>
                  </td>
                  <td>
                    <div style={{fontWeight: 500}}>{s.nama}</div>
                  </td>
                  <td className="num right-align">
                    {s.materi > 0
                      ? <span className="row-flex" style={{justifyContent: "flex-end", gap: 6}}>
                          <Icon name="book" size={13} style={{color: "var(--navy-500)"}}/>
                          <b>{s.materi}</b>
                          <span className="muted" style={{fontSize: 11}}>file</span>
                        </span>
                      : <span className="muted" style={{fontSize: 12}}>—</span>}
                  </td>
                  <td className="num right-align">
                    {s.video > 0
                      ? <span className="row-flex" style={{justifyContent: "flex-end", gap: 6}}>
                          <Icon name="presence" size={13} style={{color: "var(--gold-600)"}}/>
                          <b>{s.video}</b>
                          <span className="muted" style={{fontSize: 11}}>video</span>
                        </span>
                      : <span className="muted" style={{fontSize: 12}}>—</span>}
                  </td>
                  <td className="num right-align">
                    {s.tugas > 0
                      ? <span className="row-flex" style={{justifyContent: "flex-end", gap: 6}}>
                          <Icon name="grade" size={13} style={{color: "var(--ok)"}}/>
                          <b>{s.tugas}</b>
                          <span className="muted" style={{fontSize: 11}}>tugas</span>
                        </span>
                      : <span className="muted" style={{fontSize: 12}}>—</span>}
                  </td>
                  <td>
                    {hasAny
                      ? <Pill tone="ok" dot>Terunggah</Pill>
                      : <Pill tone="err">Belum diisi</Pill>}
                  </td>
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            <tr style={{background: "var(--paper)", position: "sticky", bottom: 0}}>
              <td colSpan={2} style={{padding: "12px 16px", fontWeight: 600, fontSize: 12.5, color: "var(--muted)"}}>
                Total unggahan
              </td>
              <td className="num right-align" style={{padding: "12px 16px", fontWeight: 700, fontSize: 14}}>{totalM}</td>
              <td className="num right-align" style={{padding: "12px 16px", fontWeight: 700, fontSize: 14}}>{totalV}</td>
              <td className="num right-align" style={{padding: "12px 16px", fontWeight: 700, fontSize: 14}}>{totalT}</td>
              <td style={{padding: "12px 16px"}}/>
            </tr>
          </tfoot>
        </table>
      </div>
    </Modal>
  );
}

  </script>

  <script type="text/babel">
// siakad/screen-kelas.jsx — Kelas Kuliah module
// Wizard (6 tabs) + detail (8 sidebar sections) + list dashboard

const KELAS_DEMO = [
  { id: "KLS001", kode: "IF2031", nama: "PBO — Kelas A",      sks: 3, dosen: "Dr. Aulia Rahman",        kuota: 50, terdaftar: 48, waitlist: 0,  status: "aktif",  prodi: "Informatika" },
  { id: "KLS002", kode: "IF2031", nama: "PBO — Kelas B",      sks: 3, dosen: "Dr. Aulia Rahman",        kuota: 50, terdaftar: 50, waitlist: 14, status: "aktif",  prodi: "Informatika", warn: true },
  { id: "KLS003", kode: "IF4051", nama: "AI — Kelas A",        sks: 4, dosen: "Dr. Bayu Pratama",       kuota: 40, terdaftar: 38, waitlist: 0,  status: "aktif",  prodi: "Informatika" },
  { id: "KLS004", kode: "MJ3021", nama: "Pemasaran — Kelas C", sks: 3, dosen: "Drs. Iwan Surya, M.M.",  kuota: 50, terdaftar: 50, waitlist: 22, status: "aktif",  prodi: "Manajemen",   warn: true, criticalWaitlist: true },
  { id: "KLS005", kode: "AK3041", nama: "Audit Internal — A",  sks: 3, dosen: "Dr. Yusran Akbar",       kuota: 50, terdaftar: 41, waitlist: 0,  status: "aktif",  prodi: "Akuntansi" },
  { id: "KLS006", kode: "MM5011", nama: "Strategic Mgmt",      sks: 3, dosen: "Prof. Dr. Hadi Suwondo", kuota: 40, terdaftar: 38, waitlist: 0,  status: "aktif",  prodi: "Magister Manajemen" },
  { id: "KLS007", kode: "PSI2011", nama: "Psi. Sosial — A",     sks: 3, dosen: "Dr. Linda Hapsari",     kuota: 50, terdaftar: 32, waitlist: 0,  status: "draft",  prodi: "Psikologi" },
];

function ScreenKelas() {
  const [mode, setMode]               = useState("list"); // list | wizard | detail
  const [selected, setSelected]       = useState(null);
  const [classes, setClasses]         = useState(KELAS_DEMO);
  const [toast, setToast]             = useState(null);

  const openParallel = (k) => {
    // Simulate creating a parallel class
    const letter = String.fromCharCode("A".charCodeAt(0) + k.nama.length % 26 + 1);
    const newClass = {
      id: `KLS${String(classes.length + 1).padStart(3, "0")}`,
      kode: k.kode,
      nama: k.nama.replace(/Kelas .$/, `Kelas ${letter}`) || `${k.kode} — Kelas Paralel`,
      sks: k.sks, dosen: "— Belum diplot —", prodi: k.prodi,
      kuota: k.kuota, terdaftar: 0, waitlist: 0, status: "draft",
    };
    // Reset old class waitlist
    setClasses(cs => [newClass, ...cs.map(c => c.id === k.id ? { ...c, waitlist: Math.max(0, c.waitlist - 20), criticalWaitlist: false } : c)]);
    setToast(`✓ Kelas paralel ${newClass.id} dibuat (${newClass.nama}). 20 mahasiswa waitlist otomatis dipindah ke kelas baru.`);
    setTimeout(() => setToast(null), 6000);
  };

  if (mode === "wizard") {
    return <KelasWizard
      onCancel={() => setMode("list")}
      onSave={(data) => {
        setClasses(c => [{ id: `KLS${String(c.length + 1).padStart(3, "0")}`, ...data, terdaftar: 0, waitlist: 0, status: "draft" }, ...c]);
        setMode("list");
        setToast(`✓ Kelas "${data.nama}" berhasil dibuat sebagai draft.`);
        setTimeout(() => setToast(null), 5000);
      }}
    />;
  }
  if (mode === "detail" && selected) {
    return <KelasDetail kelas={selected} onBack={() => { setSelected(null); setMode("list"); }}/>;
  }

  return (
    <>
      <KelasList
        classes={classes}
        onCreate={() => setMode("wizard")}
        onSelect={k => { setSelected(k); setMode("detail"); }}
        onOpenParallel={openParallel}
      />
      {toast && (
        <div style={{
          position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
          background: "var(--navy-700)", color: "#fff",
          padding: "12px 22px", borderRadius: 12,
          boxShadow: "0 12px 32px rgba(0,0,0,.2)",
          zIndex: 200, maxWidth: 480,
          fontSize: 13.5, fontWeight: 500,
          animation: "fadeIn .2s ease",
        }}>
          {toast}
        </div>
      )}
    </>
  );
}

/* ============ List + Dashboard ============ */
function KelasList({ classes, onCreate, onSelect, onOpenParallel }) {
  const [search, setSearch] = useState("");
  const [prodi, setProdi]   = useState("Semua");
  const [statusF, setStatusF] = useState("Semua");
  const programs = window.SIAKAD_DATA.programs;

  const filtered = useMemo(() => {
    let r = classes;
    if (prodi !== "Semua")   r = r.filter(k => k.prodi === prodi);
    if (statusF !== "Semua") r = r.filter(k => k.status === statusF.toLowerCase());
    if (search) {
      const t = search.toLowerCase();
      r = r.filter(k => k.kode.toLowerCase().includes(t) || k.nama.toLowerCase().includes(t) || k.dosen.toLowerCase().includes(t));
    }
    return r;
  }, [classes, prodi, statusF, search]);

  const fullClasses = classes.filter(k => k.terdaftar >= k.kuota).length;
  const totalWL = classes.reduce((s, k) => s + k.waitlist, 0);
  const criticalWL = classes.filter(k => k.criticalWaitlist).length;
  const avgFill = classes.length ? Math.round(classes.reduce((s, k) => s + (k.terdaftar / k.kuota) * 100, 0) / classes.length) : 0;

  return (
    <>
      <PageHd
        eyebrow={PAGE_TITLES.kelas.eyebrow}
        title={PAGE_TITLES.kelas.title}
        lede={PAGE_TITLES.kelas.lede}

        marginBottom: 24,
        display: "flex", alignItems: "center", gap: 16,
      }}>
        <div style={{
          width: 40, height: 40, borderRadius: 10,
          background: "var(--gold-500)", color: "#0a2540",

        }}><Icon name="clock" size={20}/></div>
        <div style={{flex: 1}}>
          <div style={{fontSize: 13, color: "var(--muted)", fontFamily: "var(--ff-sans)", textTransform: "uppercase", letterSpacing: ".12em", fontWeight: 600}}>
            Periode Akademik Aktif (acuan "Buat Kelas")
          </div>
          <div style={{fontFamily: "var(--ff-display)", fontSize: 18, fontWeight: 600, marginTop: 2}}>
            Ganjil 2026/2027 <span className="muted" style={{fontWeight: 400}}>· 01 Sep 2026 — 31 Jan 2027</span>
          </div>
        </div>
        <Pill tone="ok" dot>Aktif · sedang perkuliahan</Pill>
      </div>

      {/* KPIs */}
      <div className="kpi-grid" style={{gridTemplateColumns:"repeat(4, 1fr)", marginBottom:24}}>
        <KpiSmall2 label="Total kelas dibuka" value={classes.length}    sub={`${avgFill}% rata-rata terisi`} accent="navy"/>
        <KpiSmall2 label="Kelas penuh"         value={fullClasses}      sub="Kapasitas 100% terisi" accent="gold"/>
        <KpiSmall2 label="Mahasiswa di waitlist" value={totalWL}        sub={`${criticalWL} kelas perlu peninjauan`} accent={criticalWL > 0 ? "err" : "warn"}/>
        <KpiSmall2 label="Kelas draft"          value={classes.filter(k => k.status === "draft").length} sub="Belum siap publish" accent="warn"/>
      </div>

      {/* Waiting list alert */}
      {criticalWL > 0 && (
        <Card title="Notifikasi Waiting List" sub="Waiting list ≥ ambang batas — pertimbangkan buka kelas paralel" tight className="card" >
          {classes.filter(k => k.criticalWaitlist).map(k => (
            <div key={k.id} style={{
              display: "grid",
              gridTemplateColumns: "44px 1fr auto",
              gap: 14, alignItems: "center",
              padding: "14px 20px",
              borderBottom: "1px solid var(--line)",
            }}>
              <div style={{width: 44, height: 44, borderRadius: 10, background: "var(--err-bg)", color: "var(--err)", display: "grid", placeItems: "center"}}>
                <Icon name="warn" size={20}/>
              </div>
              <div>
                <div style={{fontWeight: 600, fontSize: 14}}>{k.nama} <span className="mono muted" style={{fontWeight: 400, fontSize: 12}}>· {k.kode}</span></div>
                <div className="muted" style={{fontSize: 12.5}}>
                  Kuota <b style={{color: "var(--ink)"}}>{k.terdaftar}/{k.kuota}</b> · Waiting list <b style={{color: "var(--err)"}}>{k.waitlist} mahasiswa</b> · {k.dosen}
                </div>
              </div>
              <div className="row-flex">
                <button className="btn sm">Tinjau manual</button>
                <button className="btn sm primary" onClick={() => onOpenParallel(k)}>Buka kelas paralel</button>
              </div>
            </div>
          ))}
        </Card>
      )}

      <Card
        title="Daftar Kelas"
        sub={`${filtered.length} dari ${classes.length} kelas pada periode aktif`}
        action={
          <>
            <input className="input search" placeholder="Cari kelas, MK, dosen…"
                   value={search} onChange={e => setSearch(e.target.value)} style={{minWidth: 220, marginTop: criticalWL ? 16 : 0}}/>
            <select className="select" value={prodi} onChange={e => setProdi(e.target.value)}>
              <option>Semua</option>
              {programs.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
            </select>
            <select className="select" value={statusF} onChange={e => setStatusF(e.target.value)}>
              <option>Semua</option><option>Aktif</option><option>Draft</option>
            </select>
          </>
        }
        tight
        className="card"
      >
        <div className="tbl-wrap">
          <table className="tbl">
            <thead>
              <tr>
                <th>ID</th><th>Mata Kuliah</th><th>Dosen Pengampu</th><th style={{textAlign:"right"}}>SKS</th>
                <th style={{textAlign:"right"}}>Kuota / Terdaftar</th>
                <th style={{textAlign:"right"}}>Waitlist</th>
                <th>Status</th><th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(k => {
                const pct = (k.terdaftar / k.kuota) * 100;
                const full = pct >= 100;
                return (
                  <tr key={k.id} onClick={() => onSelect(k)}>
                    <td className="mono" style={{fontSize: 12}}>{k.id}</td>
                    <td>
                      <div style={{fontWeight: 600}}>{k.nama}</div>
                      <div className="muted mono" style={{fontSize: 11, marginTop: 2}}>{k.kode} · {k.prodi}</div>
                    </td>
                    <td className="muted" style={{fontSize: 12.5}}>{k.dosen}</td>
                    <td className="num right-align">{k.sks}</td>
                    <td style={{minWidth: 180}}>
                      <div className="row-flex" style={{gap: 10, justifyContent: "flex-end"}}>
                        <span className="mono" style={{fontSize: 12.5, fontWeight: 600, minWidth: 60, textAlign: "right"}}>
                          {k.terdaftar}/{k.kuota}
                        </span>
                        <div className="bar" style={{width: 80, height: 6}}>
                          <i className={full ? "err" : pct > 85 ? "warn" : "ok"} style={{width: Math.min(100, pct) + "%"}}/>
                        </div>
                      </div>
                    </td>
                    <td className="num right-align">
                      {k.waitlist > 0
                        ? <Pill tone={k.criticalWaitlist ? "err" : "warn"}>{k.waitlist}</Pill>
                        : <span className="muted">—</span>}
                    </td>
                    <td>
                      {k.status === "aktif" && <Pill tone="ok" dot>Aktif</Pill>}
                      {k.status === "draft" && <Pill tone="warn">Draft</Pill>}

                    <td className="right-align">

                  Tidak ada kelas yang cocok dengan filter.

        </div>
      </Card>
    </>
  );
}

const WIZARD_STEPS = [
  { id: "info",    label: "Informasi Dasar", icon: "info" },

  { id: "kuota",   label: "Kapasitas",        icon: "users" },

function KelasWizard({ onCancel, onSave }) {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({
    kode: "", nama: "", sks: 3, prodi: "Informatika",
    periode: "20261",
    dosenUtama: "",
    tim: [],
    kuota: 50,
    waitlistThreshold: 20,
    rps: null, kontrak: null,
    jadwalMulai: "", hari: "Senin", jam: "08:00",
    sesi: [],
    bobot: { tugas: 20, kuis: 10, uts: 25, uas: 35, kehadiran: 10 },
  });
  const setField = (k, v) => setData(d => ({ ...d, [k]: v }));
  const canNext = () => {
    if (step === 0) return data.kode && data.nama && data.periode;
    if (step === 1) return !!data.dosenUtama;
    return true;
  };

  return (
    <>
      <PageHd
        eyebrow="Wizard"
        title="Tambah Kelas Kuliah"
        lede="Lengkapi 6 tahap di bawah untuk membuat kelas baru. Kelas terikat pada periode akademik aktif."
      >
        <button className="btn ghost" onClick={onCancel}>
          <Icon name="x" size={14}/>Batal
        </button>
      </PageHd>

      {/* Stepper */}
      <div style={{
        display: "grid",
        gridTemplateColumns: `repeat(${WIZARD_STEPS.length}, 1fr)`,
        background: "var(--surface)",
        border: "1px solid var(--line)",
        borderRadius: 16, padding: 6, marginBottom: 20,
        boxShadow: "var(--shadow-card)",
      }}>
        {WIZARD_STEPS.map((s, i) => {
          const done = i < step, active = i === step;
          return (
            <button key={s.id} onClick={() => i <= step && setStep(i)}
                    disabled={i > step}
                    style={{
                      display: "grid",
                      gridTemplateColumns: "32px 1fr",
                      alignItems: "center",
                      gap: 10,
                      padding: "12px 14px",
                      background: active ? "var(--navy-700)" : "transparent",
                      color: active ? "#fff" : done ? "var(--ink)" : "var(--muted)",
                      border: 0, borderRadius: 10,
                      cursor: i <= step ? "pointer" : "not-allowed",
                      textAlign: "left", fontFamily: "inherit",
                      transition: "background .15s ease",
                    }}>
              <div style={{
                width: 32, height: 32, borderRadius: 8,
                background: active ? "var(--gold-500)" : done ? "var(--ok)" : "var(--paper-2)",
                color: active ? "#0a2540" : done ? "#fff" : "var(--muted)",
                display: "grid", placeItems: "center",
                fontFamily: "var(--ff-display)", fontWeight: 700, fontSize: 13,
              }}>
                {done ? <Icon name="check" size={14}/> : i + 1}
              </div>
              <div>
                <div style={{fontSize: 11, opacity: .65, fontFamily: "var(--ff-sans)", textTransform: "uppercase", letterSpacing: ".1em", fontWeight: 600}}>
                  Tahap {i + 1}
                </div>
                <div style={{fontWeight: 600, fontSize: 13}}>{s.label}</div>
              </div>
            </button>
          );
        })}
      </div>

      {/* Content */}
      <div className="card" style={{padding: 28}}>
        {step === 0 && <WizInfo data={data} setField={setField}/>}
        {step === 1 && <WizDosen data={data} setField={setField}/>}
        {step === 2 && <WizKuota data={data} setField={setField}/>}
        {step === 3 && <WizDoc data={data} setField={setField}/>}
        {step === 4 && <WizJadwal data={data} setField={setField}/>}
        {step === 5 && <WizNilai data={data} setField={setField}/>}
      </div>

      <div className="row-flex" style={{justifyContent: "space-between", marginTop: 20}}>
        <button className="btn" disabled={step === 0} onClick={() => setStep(s => s - 1)}>
          <Icon name="cheL" size={14}/>Kembali
        </button>
        <div className="muted" style={{fontSize: 12.5}}>
          Tahap {step + 1} dari {WIZARD_STEPS.length}
        </div>
        {step < WIZARD_STEPS.length - 1 ? (
          <button className="btn primary" disabled={!canNext()} onClick={() => setStep(s => s + 1)}>
            Lanjut<Icon name="cheR" size={14}/>
          </button>
        ) : (
          <button className="btn primary" onClick={() => onSave(data)}>
            <Icon name="check" size={14}/>Buat Kelas
          </button>
        )}
      </div>
    </>
  );
}

function WizJadwal({ data, setField }) {
  const [sesi, setSesi] = useState(data.sesi);
  const periode = window.SIAKAD_STATE.get().periodeAktif;

  // Auto-fill tanggal mulai dari periode aktif (#4)
  useEffect(() => {
    if (!data.jadwalMulai && periode?.mulai) {
      setField("jadwalMulai", periode.mulai);
    }
  }, []);

  const generateSesi = () => {
    if (!data.jadwalMulai) {
      alert("Pilih tanggal mulai terlebih dahulu");
      return;
    }
    const start = new Date(data.jadwalMulai);
    const out = [];
    const totalSesi = periode?.jumlahSesi || 16;
    const minggUTS = periode?.minggUTS || 8;
    const minggUAS = periode?.minggUAS || totalSesi;
    const liburMap = {};
    (periode?.liburNasional || []).forEach(l => { liburMap[l.tanggal] = l.nama; });

    const titles = [
      "Pengantar & Kontrak Kuliah",
      "Konsep Dasar",
      "Eksplorasi & Studi Kasus",
      "Metodologi I",
      "Metodologi II",
      "Latihan Praktik I",
      "Review Materi",
      "Ujian Tengah Semester",
      "Pendalaman Topik",
      "Studi Lapangan",
      "Latihan Praktik II",
      "Diskusi Kelompok",
      "Proyek Mini I",
      "Proyek Mini II",
      "Presentasi Akhir",
      "Ujian Akhir Semester",
    ];
    for (let i = 0; i < totalSesi; i++) {
      const d = new Date(start);
      d.setDate(start.getDate() + i * 7);
      const iso = d.toISOString().slice(0, 10);
      const ix = i + 1;
      out.push({
        no: ix,
        tanggal: iso,
        jam: data.jam,
        topik: liburMap[iso] ? `LIBUR — ${liburMap[iso]}` : titles[i] || `Sesi ${ix}`,
        tipe: ix === minggUTS ? "uts" : ix === minggUAS ? "uas" : liburMap[iso] ? "libur" : "reguler",
      });
    }
    setSesi(out);
    setField("sesi", out);
  };

  return (
    <>
      <h3 style={{fontFamily: "var(--ff-display)", fontSize: 20, fontWeight: 700, margin: "0 0 6px"}}>Jadwal Perkuliahan & Sesi</h3>
      <p className="muted" style={{margin: "0 0 16px", fontSize: 13.5}}>

function WizNilai({ data, setField }) {
  const bobotSetting = window.SIAKAD_STATE.get().bobotKomponen;

  // #5 — Use settings if configured, else show warning
  if (!bobotSetting.configured) {
    return (
      <>
        <h3 style={{fontFamily: "var(--ff-display)", fontSize: 20, fontWeight: 700, margin: "0 0 6px"}}>Bobot Komponen Nilai</h3>
        <p className="muted" style={{margin: "0 0 24px", fontSize: 13.5}}>
          Bobot komponen nilai dibaca dari pengaturan global universitas.
        </p>
        <div style={{
          padding: "32px 28px",
          background: "var(--warn-bg)",
          border: "2px dashed var(--warn)",
          borderRadius: 14,
          textAlign: "center",
        }}>
          <Icon name="warn" size={36} style={{color: "var(--warn)", marginBottom: 12}}/>
          <h4 style={{margin: "0 0 8px", fontFamily: "var(--ff-display)", fontSize: 18, fontWeight: 700, color: "var(--warn)"}}>
            Bobot komponen nilai belum di-setting
          </h4>
          <p style={{margin: "0 0 18px", color: "var(--ink-2)", fontSize: 13.5, maxWidth: 480, marginLeft: "auto", marginRight: "auto"}}>
            Buka <b>Pengaturan SIAKAD → Komposisi Nilai</b> untuk menentukan bobot Tugas, Kuis, UTS, UAS, dan Kehadiran. Total harus 100%. Setelah disetting, kelas baru akan otomatis mewarisi konfigurasi tersebut.
          </p>
          <button className="btn primary"><Icon name="external" size={14}/>Buka Pengaturan Komposisi Nilai</button>
        </div>
      </>
    );
  }

  const active = bobotSetting.items.filter(i => i.active);
  const total = active.reduce((s, i) => s + i.value, 0);
  const PALETTE = ["var(--navy-700)", "var(--navy-500)", "var(--gold-500)", "var(--gold-600)", "var(--ok)"];

  return (
    <>
      <h3 style={{fontFamily: "var(--ff-display)", fontSize: 20, fontWeight: 700, margin: "0 0 6px"}}>Bobot Komponen Nilai</h3>
      <p className="muted" style={{margin: "0 0 16px", fontSize: 13.5}}>
        Bobot di bawah otomatis diisi dari pengaturan global universitas. Dosen dapat menyesuaikan per kelas dengan persetujuan Kaprodi.
      </p>

      <div style={{padding: "12px 14px", background: "var(--info-bg)", color: "var(--info)", borderRadius: 10, marginBottom: 16, fontSize: 12.5, display: "flex", alignItems: "center", justifyContent: "space-between"}}>
        <span>
          <Icon name="info" size={14} style={{verticalAlign: "middle", marginRight: 6}}/>
          Bobot diwarisi dari <b>Pengaturan → Komposisi Nilai</b> · {active.length} komponen aktif
        </span>
        <button className="btn sm ghost" style={{color: "var(--info)"}}>
          <Icon name="external" size={12}/>Buka Pengaturan
        </button>
      </div>

      <div className="stack-bar" style={{margin: "0 0 20px"}}>
        {active.map((s, i) => (
          <div key={s.id}
               style={{width: (s.value / Math.max(total, 1)) * 100 + "%", background: PALETTE[i % PALETTE.length], display: "grid", placeItems: "center", color: i === 2 || i === 3 ? "#0a2540" : "#fff", fontSize: 11, fontWeight: 700}}>
            {(s.value / total) * 100 >= 8 ? `${s.value}%` : ""}
          </div>
        ))}
      </div>

      <table className="tbl" style={{borderRadius: 10, overflow: "hidden"}}>
        <thead>
          <tr><th>Komponen</th><th style={{textAlign:"right"}}>Bobot default</th><th style={{textAlign:"right"}}>Override kelas</th></tr>
        </thead>
        <tbody>
          {active.map(s => (
            <tr key={s.id}>
              <td><b style={{fontWeight: 500}}>{s.label}</b></td>
              <td className="num right-align mono">{s.value}%</td>
              <td className="num right-align">
                <input type="number" defaultValue={s.value}
                       style={{width: 70, padding: "5px 8px", border: "1px solid var(--line)", borderRadius: 6, textAlign: "center", fontSize: 13}}/>
              </td>
            </tr>
          ))}
          <tr style={{background: "var(--paper)"}}>
            <td style={{fontWeight: 600, padding: "12px 16px"}}>Total</td>
            <td className="num right-align" style={{fontWeight: 700, fontSize: 14, padding: "12px 16px", color: total === 100 ? "var(--ok)" : "var(--err)"}}>{total}%</td>
            <td className="num right-align" style={{padding: "12px 16px", color: "var(--muted)", fontSize: 12}}>Harus 100%</td>
          </tr>
        </tbody>
      </table>
    </>
  );
}

function DetailNilai({ kelas }) {
  // Generate per-student grades for #6
  const baseStudents = window.SIAKAD_DATA.students.slice(0, Math.min(kelas.terdaftar, 14));
  const rows = baseStudents.map((s, i) => {
    const seed = (s.nim.charCodeAt(8) + i * 13) % 100;
    const tugas    = Math.min(100, 65 + (seed % 36));
    const kuis     = Math.min(100, 60 + ((seed * 3) % 41));
    const uts      = Math.min(100, 55 + ((seed * 7) % 46));
    const uas      = i % 5 === 0 ? null : Math.min(100, 60 + ((seed * 11) % 41));   // some not yet inputted
    const hadir    = Math.min(100, 70 + ((seed * 5) % 31));
    const final = uas === null ? null : (tugas * 0.20 + kuis * 0.10 + uts * 0.25 + uas * 0.35 + hadir * 0.10);
    let huruf, mutu;
    if (final === null) { huruf = "T"; mutu = "—"; }
    else if (final >= 85) { huruf = "A";  mutu = 4.00; }
    else if (final >= 80) { huruf = "A-"; mutu = 3.70; }
    else if (final >= 75) { huruf = "B+"; mutu = 3.30; }
    else if (final >= 70) { huruf = "B";  mutu = 3.00; }
    else if (final >= 65) { huruf = "B-"; mutu = 2.70; }
    else if (final >= 60) { huruf = "C+"; mutu = 2.30; }
    else if (final >= 55) { huruf = "C";  mutu = 2.00; }
    else if (final >= 45) { huruf = "D";  mutu = 1.00; }
    else                  { huruf = "E";  mutu = 0.00; }
    return { nim: s.nim, name: s.name, tugas, kuis, uts, uas, hadir, final, huruf, mutu };
  });

  const inputted = rows.filter(r => r.uas !== null);
  const avg = inputted.length > 0 ? inputted.reduce((s, r) => s + r.final, 0) / inputted.length : 0;
  const passed = inputted.filter(r => r.final >= 55).length;

  const huruvColor = (h) => {
    if (["A", "A-"].includes(h)) return "var(--ok)";
    if (["B+", "B", "B-"].includes(h)) return "var(--gold-600)";
    if (["C+", "C"].includes(h)) return "var(--warn)";
    if (["D", "E"].includes(h)) return "var(--err)";
    return "var(--muted)";
  };

  return (
    <>
      <Card title="Nilai Perkuliahan" sub={`${rows.length} mahasiswa · Komposisi Tugas 20% + Kuis 10% + UTS 25% + UAS 35% + Kehadiran 10%`}

            <div style={{fontFamily: "var(--ff-display)", fontSize: 22, fontWeight: 700, marginTop: 4, color: "var(--ok)"}}>{avg.toFixed(1)}</div>
          </div>
          <div>
            <div className="muted" style={{fontSize: 10.5, fontFamily: "var(--ff-sans)", textTransform: "uppercase", letterSpacing: ".12em", fontWeight: 600}}>Lulus</div>
            <div style={{fontFamily: "var(--ff-display)", fontSize: 22, fontWeight: 700, marginTop: 4}}>{passed}/{inputted.length}</div>

          <div>

            <div style={{marginTop: 6}}>
              <Pill tone={inputted.length === rows.length ? "ok" : "warn"} dot>
                {inputted.length === rows.length ? "Lengkap" : `${rows.length - inputted.length} belum`}
              </Pill>
            </div>

        </div>
        <div className="tbl-wrap">
          <table className="tbl">
            <thead>
              <tr>
                <th>NIM</th>
                <th>Nama Mahasiswa</th>
                <th style={{textAlign:"right"}}>Tugas<br/><small style={{fontWeight:400, color:"var(--muted-2)"}}>20%</small></th>

                <th style={{textAlign:"right"}}>UTS<br/><small style={{fontWeight:400, color:"var(--muted-2)"}}>25%</small></th>
                <th style={{textAlign:"right"}}>UAS<br/><small style={{fontWeight:400, color:"var(--muted-2)"}}>35%</small></th>
                <th style={{textAlign:"right"}}>Hadir<br/><small style={{fontWeight:400, color:"var(--muted-2)"}}>10%</small></th>
                <th style={{textAlign:"right"}}>Nilai Akhir</th>

            </thead>
            <tbody>
              {rows.map(r => (
                <tr key={r.nim}>

                    </div>
                  </td>
                  <td className="num right-align">{r.tugas}</td>
                  <td className="num right-align">{r.kuis}</td>
                  <td className="num right-align">{r.uts}</td>
                  <td className="num right-align" style={{color: r.uas === null ? "var(--muted)" : "inherit"}}>{r.uas === null ? "—" : r.uas}</td>
                  <td className="num right-align">{r.hadir}</td>
                  <td className="num right-align" style={{fontWeight: 700, fontSize: 14, color: r.final === null ? "var(--muted)" : r.final >= 55 ? "var(--ok)" : "var(--err)"}}>
                    {r.final === null ? "—" : r.final.toFixed(1)}
                  </td>
                  <td>
                    <span style={{
                      display: "inline-flex", alignItems: "center", justifyContent: "center",
                      minWidth: 36, padding: "3px 8px", borderRadius: 6,

                  <td className="num right-align mono">{r.mutu}</td>
                </tr>
              ))}

/* ============ 1. NIM ============ */
function SetNIM() {
  const [segments, setSegments] = useState([
    { id: "year",     label: "Tahun masuk",   sample: "26",   desc: "2 digit terakhir tahun masuk", editable: true },
    { id: "prodi",    label: "Kode prodi",    sample: "11",   desc: "2 digit kode prodi (cth. IF=11)", editable: true },
    { id: "jalur",    label: "Jalur masuk",   sample: "1",    desc: "1=Mandiri 2=Beasiswa 3=Karyawan 4=Transfer", editable: true },
    { id: "seq",      label: "Urutan",        sample: "0001", desc: "Counter otomatis (4 digit, reset tiap tahun)", editable: false },
  ]);
  const [enabled, setEnabled] = useState({ year: true, prodi: true, jalur: false, seq: true });
  const [digits, setDigits] = useState(4);
  const [draggedId, setDraggedId] = useState(null);

  const PALETTE = ["var(--navy-700)", "var(--gold-500)", "var(--info)", "var(--ok)", "var(--warn)"];

  const active = segments.filter(s => enabled[s.id] || s.id === "seq");
  const sample = active.map(s => s.id === "seq" ? "0001".slice(-digits) : s.sample).join("");

  const move = (id, dir) => {
    const i = segments.findIndex(s => s.id === id);
    if (i < 0) return;
    const j = i + dir;
    if (j < 0 || j >= segments.length) return;
    const copy = [...segments];
    [copy[i], copy[j]] = [copy[j], copy[i]];
    setSegments(copy);
  };

  const onDragStart = (id) => setDraggedId(id);
  const onDragOver = (e) => e.preventDefault();
  const onDrop = (targetId) => {
    if (!draggedId || draggedId === targetId) { setDraggedId(null); return; }
    const from = segments.findIndex(s => s.id === draggedId);
    const to = segments.findIndex(s => s.id === targetId);
    const copy = [...segments];
    const [moved] = copy.splice(from, 1);
    copy.splice(to, 0, moved);
    setSegments(copy);
    setDraggedId(null);
  };

  return (
    <>
      <PanelHeader icon="hash" title="Pengaturan NIM"
                   desc="Atur format generator Nomor Induk Mahasiswa. Drag tag untuk mengubah urutan komponen NIM."/>

      <div className="setting-card">
        <div className="setting-card-hd">
          <span>Susunan komponen NIM</span>
          <span className="muted" style={{fontSize: 12, fontWeight: 400, fontFamily: "var(--ff-sans)"}}>Geser untuk mengubah urutan</span>
        </div>

        <div style={{padding: "24px", background: "var(--paper)"}}>
          <div style={{display: "flex", gap: 8, flexWrap: "wrap", padding: "16px", background: "var(--surface)", border: "1.5px dashed var(--line-2)", borderRadius: 14, minHeight: 84, alignItems: "center"}}>
            {segments.map((s, i) => {
              const isActive = enabled[s.id] || s.id === "seq";
              return (
                <div key={s.id}
                     draggable={true}
                     onDragStart={() => onDragStart(s.id)}
                     onDragOver={onDragOver}
                     onDrop={() => onDrop(s.id)}
                     onDragEnd={() => setDraggedId(null)}
                     style={{
                       display: "flex", alignItems: "center", gap: 8,
                       padding: "8px 6px 8px 12px",
                       background: isActive ? PALETTE[i % PALETTE.length] : "var(--paper-2)",
                       color: isActive ? "#fff" : "var(--muted)",
                       borderRadius: 10,
                       fontFamily: "var(--ff-sans)",
                       fontWeight: 600,
                       fontSize: 13,
                       cursor: "grab",
                       opacity: draggedId === s.id ? 0.4 : 1,
                       transition: "opacity .15s",
                       boxShadow: "0 2px 6px rgba(0,0,0,.08)",
                     }}>
                  <span style={{
                    opacity: .6, fontSize: 14, cursor: "grab",
                    display: "inline-grid", placeItems: "center",
                  }}>⋮⋮</span>
                  <div>
                    <div style={{fontSize: 9.5, opacity: .7, fontFamily: "var(--ff-sans)", textTransform: "uppercase", letterSpacing: ".1em", fontWeight: 600}}>{i + 1}. {s.label}</div>
                    <div className="mono" style={{fontWeight: 700, marginTop: 1}}>{s.id === "seq" ? "0001".slice(-digits) : s.sample}</div>
                  </div>
                  <div style={{display: "flex", flexDirection: "column", gap: 2, marginLeft: 4, opacity: .8}}>
                    <button onClick={() => move(s.id, -1)} disabled={i === 0}
                            style={{background: "transparent", border: 0, color: "inherit", cursor: i === 0 ? "not-allowed" : "pointer", padding: 0, fontSize: 8, opacity: i === 0 ? 0.3 : 1}}>▲</button>
                    <button onClick={() => move(s.id, 1)} disabled={i === segments.length - 1}
                            style={{background: "transparent", border: 0, color: "inherit", cursor: i === segments.length - 1 ? "not-allowed" : "pointer", padding: 0, fontSize: 8, opacity: i === segments.length - 1 ? 0.3 : 1}}>▼</button>
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{marginTop: 20}}>
            <div className="muted" style={{fontSize: 11, fontFamily: "var(--ff-sans)", textTransform: "uppercase", letterSpacing: ".14em", fontWeight: 600, marginBottom: 8}}>
              Pratinjau hasil
            </div>
            <div style={{
              padding: "20px 24px", background: "var(--navy-700)", color: "#fff",
              borderRadius: 12, textAlign: "center",
              fontFamily: "var(--ff-mono)", fontSize: 36, fontWeight: 600, letterSpacing: "0.06em",
            }}>{sample}</div>
            <div className="muted" style={{fontSize: 12, textAlign: "center", marginTop: 8}}>
              Format: {active.map(s => `<${s.id}>`).join("")} — total {sample.length} karakter
            </div>
          </div>
        </div>
      </div>

      <div className="setting-card">
        <div className="setting-card-hd">Komponen aktif & opsi</div>
        <table className="tbl">
          <thead>
            <tr>
              <th style={{width: 40}}></th>
              <th>Komponen</th>
              <th>Contoh</th>
              <th>Deskripsi</th>
              <th>Aktif</th>
            </tr>
          </thead>
          <tbody>
            {segments.map((s, i) => (
              <tr key={s.id}>
                <td className="mono muted">{i + 1}</td>
                <td><b style={{fontWeight: 600}}>{s.label}</b></td>
                <td className="mono">{s.id === "seq" ? "0001".slice(-digits) : s.sample}</td>
                <td className="muted" style={{fontSize: 12.5}}>{s.desc}</td>
                <td>
                  {s.id === "seq"
                    ? <Pill tone="info">Wajib</Pill>
                    : <Toggle value={enabled[s.id]} onChange={(v) => setEnabled(e => ({ ...e, [s.id]: v }))}/>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="setting-card">
        <div className="setting-card-hd">Opsi tambahan</div>
        <div className="field-grid">
          <Field label="Digit urutan" hint="Panjang counter di akhir NIM">
            <select value={digits} onChange={e => setDigits(Number(e.target.value))}>
              <option value={3}>3 digit (max 999/tahun)</option>
              <option value={4}>4 digit (max 9.999/tahun)</option>
              <option value={5}>5 digit (max 99.999/tahun)</option>
            </select>
          </Field>
          <Field label="Reset counter setiap tahun">
            <Toggle value={true} onChange={()=>{}}/>
          </Field>
        </div>
      </div>

      <div className="setting-card">
        <div className="setting-card-hd">Counter aktif per program studi</div>
        <table className="tbl">
          <thead><tr><th>Prodi</th><th style={{textAlign:"right"}}>Counter 2026</th><th style={{textAlign:"right"}}>Counter 2025</th><th>Status</th></tr></thead>
          <tbody>
            <tr><td>Informatika</td><td className="num right-align mono">0047</td><td className="num right-align mono">0234</td><td><Pill tone="ok" dot>Aktif</Pill></td></tr>
            <tr><td>Sistem Informasi</td><td className="num right-align mono">0023</td><td className="num right-align mono">0156</td><td><Pill tone="ok" dot>Aktif</Pill></td></tr>
            <tr><td>Manajemen</td><td className="num right-align mono">0038</td><td className="num right-align mono">0218</td><td><Pill tone="ok" dot>Aktif</Pill></td></tr>
            <tr><td>Magister Manajemen</td><td className="num right-align mono">0007</td><td className="num right-align mono">0042</td><td><Pill tone="ok" dot>Aktif</Pill></td></tr>
          </tbody>
        </table>
      </div>
    </>
  );
}

      </div>

      {/* Step 2: Kalender Akademik dari periode terpilih */}

            <tbody>

                  <td>
                    <span style={{
                      display: "inline-grid", placeItems: "center",

function phaseImpact(phase) {
  const p = phase.toLowerCase();
  if (p.includes("krs"))         return "LMS push kelas · Keuangan cek clearance";
  if (p.includes("perkuliahan")) return "LMS membuka modul kelas & presensi";
  if (p.includes("uts"))         return "LMS aktifkan kuis UTS";
  if (p.includes("uas"))         return "LMS aktifkan kuis UAS";
  if (p.includes("nilai"))       return "Dosen dapat input nilai akhir";
  if (p.includes("kunci"))       return "PDDikti Feeder ekspor data";
  return "—";
}

function BuatPeriodeModal({ onClose, onSave }) {
  const [step, setStep] = useState(1);
  const [name, setName]         = useState("");
  const [tahun, setTahun]       = useState("2027/2028");
  const [semester, setSemester] = useState("Ganjil");
  const [start, setStart]       = useState("");
  const [end, setEnd]           = useState("");
  const [jumlahSesi, setJumlahSesi]   = useState(16);
  const [minggUTS, setMinggUTS]       = useState(8);
  const [minggUAS, setMinggUAS]       = useState(16);
  const [libur, setLibur]             = useState([
    { tanggal: "", nama: "" },
  ]);
  const [aktivitas, setAktivitas] = useState([
    { minggu: 1,  nama: "Orientasi Mahasiswa Baru" },
    { minggu: 16, nama: "Minggu UAS" },
  ]);

  const id = `${tahun.slice(0, 4)}${semester === "Ganjil" ? 1 : semester === "Genap" ? 2 : "P"}`;
  const valid1 = name.trim() && start && end;
  const valid2 = jumlahSesi > 0 && minggUTS > 0 && minggUAS > 0;

  const addLibur = () => setLibur(l => [...l, { tanggal: "", nama: "" }]);
  const removeLibur = (i) => setLibur(l => l.filter((_, ix) => ix !== i));
  const updLibur = (i, k, v) => setLibur(l => l.map((x, ix) => ix === i ? { ...x, [k]: v } : x));

  const addAkt = () => setAktivitas(a => [...a, { minggu: a.length + 1, nama: "" }]);
  const removeAkt = (i) => setAktivitas(a => a.filter((_, ix) => ix !== i));
  const updAkt = (i, k, v) => setAktivitas(a => a.map((x, ix) => ix === i ? { ...x, [k]: v } : x));

  return (
    <Modal
      title="Buat Periode Akademik"
      subtitle="Periode adalah wadah lengkap untuk satu semester — termasuk jumlah sesi, UTS/UAS, libur nasional, dan kalender aktivitas."

      footer={
        <>
          <button className="btn ghost" onClick={onClose}>Batal</button>
          {step > 1 && <button className="btn" onClick={() => setStep(s => s - 1)}><Icon name="cheL" size={14}/>Kembali</button>}
          {step < 3 ? (
            <button className="btn primary" onClick={() => setStep(s => s + 1)} disabled={step === 1 ? !valid1 : !valid2}>
              Lanjut<Icon name="cheR" size={14}/>
            </button>
          ) : (
            <button className="btn primary"
                    onClick={() => onSave({
                      id, name: name.trim(), tahun, semester, start, end, status: "draft",
                      jumlahSesi, minggUTS, minggUAS,
                      liburNasional: libur.filter(l => l.tanggal && l.nama),
                      aktivitas: aktivitas.filter(a => a.nama),
                    })}>
              <Icon name="check" size={14}/>Buat Periode
            </button>
          )}
        </>
      }
    >
      {/* Stepper */}
      <div style={{display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 4, padding: 4, background: "var(--paper)", borderRadius: 10, marginBottom: 20}}>
        {[
          [1, "Identitas"],
          [2, "Struktur Semester"],
          [3, "Libur & Aktivitas"],

          <div key={n} style={{
            padding: "10px 12px", borderRadius: 8, textAlign: "center",

            <span style={{
              width: 22, height: 22, borderRadius: "50%",
              background: step >= n ? (step === n ? "var(--gold-500)" : "var(--ok)") : "var(--paper-2)",
              color: step >= n ? (step === n ? "#0a2540" : "#fff") : "var(--muted)",

/* ============ 7. Komposisi Nilai ============ */
function SetKomposisi() {
  const PALETTE = [
    "var(--navy-700)", "var(--navy-500)", "var(--gold-500)",
    "var(--gold-600)", "var(--ok)",       "var(--info)",
    "var(--warn)",     "var(--err)",      "var(--navy-300)",
  ];

  const [comps, setComps] = useState([
    { id: 1, label: "Tugas",     desc: "Tugas individu / kelompok",        value: 20, type: "Wajib",  active: true },
    { id: 2, label: "Kuis",      desc: "Kuis mingguan di LMS",             value: 10, type: "Wajib",  active: true },
    { id: 3, label: "UTS",       desc: "Ujian Tengah Semester",            value: 25, type: "Wajib",  active: true },
    { id: 4, label: "UAS",       desc: "Ujian Akhir Semester",             value: 35, type: "Wajib",  active: true },
    { id: 5, label: "Kehadiran", desc: "Komposit aktivitas LMS",           value: 10, type: "Wajib",  active: true },
  ]);
  const [adding, setAdding]   = useState(false);
  const [editing, setEditing] = useState(null);

  const active = comps.filter(c => c.active);
  const total  = active.reduce((s, c) => s + c.value, 0);
  const ok = total === 100;

  const updateComp = (id, patch) => setComps(cs => cs.map(c => c.id === id ? { ...c, ...patch } : c));
  const removeComp = (id) => setComps(cs => cs.filter(c => c.id !== id));
  const addComp = (data) => setComps(cs => [...cs, { id: Math.max(0, ...cs.map(c => c.id)) + 1, active: true, ...data }]);

  return (
    <>
      <PanelHeader icon="pie" title="Komposisi Nilai"
                   desc="Bobot default komponen nilai akhir per mata kuliah. Dosen dapat override per kelas."/>

      {/* Datatable komponen */}
      <div className="setting-card">
        <div className="setting-card-hd">
          <span>Daftar komponen nilai</span>
          <button className="btn sm primary" onClick={() => setAdding(true)}>
            <Icon name="plus" size={12}/>Tambah Komponen Nilai
          </button>
        </div>
        <table className="tbl">
          <thead>
            <tr>
              <th style={{width: 36}}></th>
              <th>Nama Komponen</th>
              <th>Deskripsi</th>
              <th>Tipe</th>
              <th style={{textAlign: "right"}}>Bobot</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {comps.map((c) => (
              <tr key={c.id}>
                <td>
                  <span style={{
                    display: "inline-block",
                    width: 14, height: 14, borderRadius: 4,
                    background: PALETTE[active.findIndex(a => a.id === c.id) % PALETTE.length],
                    opacity: c.active ? 1 : 0.3,
                  }}/>
                </td>
                <td><b style={{fontWeight: 600}}>{c.label}</b></td>
                <td className="muted" style={{fontSize: 12.5}}>{c.desc}</td>
                <td>
                  {c.type === "Wajib" && <Pill tone="info">Wajib</Pill>}
                  {c.type === "Opsional" && <Pill tone="outline">Opsional</Pill>}
                  {c.type === "Bonus" && <Pill tone="gold">Bonus</Pill>}
                </td>
                <td className="num right-align" style={{fontWeight: 700, fontSize: 14}}>{c.value}%</td>
                <td>
                  <Toggle value={c.active} onChange={v => updateComp(c.id, { active: v })}/>
                </td>
                <td className="right-align">
                  <div className="row-flex" style={{gap: 4, justifyContent: "flex-end"}}>
                    <button className="btn sm ghost" onClick={() => setEditing(c)}><Icon name="edit" size={12}/></button>
                    <button className="btn sm ghost" onClick={() => removeComp(c.id)} style={{color: "var(--err)"}}>
                      <Icon name="x" size={12}/>
                    </button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>

        {/* Total bobot — summary block */}
        <div style={{
          padding: "18px 24px",
          borderTop: "1px solid var(--line)",
          background: "var(--paper)",
          display: "grid",
          gridTemplateColumns: "1fr auto",
          gap: 20,
          alignItems: "center",
        }}>
          <div>
            <div className="muted" style={{
              fontSize: 11,
              fontFamily: "var(--ff-sans)",
              textTransform: "uppercase",
              letterSpacing: ".14em",
              fontWeight: 600,
              marginBottom: 10,
            }}>
              Total Bobot Komponen Aktif
            </div>
            <div className="stack-bar" style={{margin: 0, height: 28}}>
              {active.map((s, i) => (
                <div key={s.id}
                     style={{
                       width: (s.value / Math.max(total, 1)) * 100 + "%",
                       background: PALETTE[i % PALETTE.length],
                       display: "grid", placeItems: "center",
                       color: i === 2 || i === 3 ? "#0a2540" : "#fff",
                       fontSize: 11, fontWeight: 700,
                     }}
                     title={`${s.label}: ${s.value}%`}>
                  {(s.value / total) * 100 >= 10 ? `${s.value}%` : ""}
                </div>
              ))}
            </div>
          </div>
          <div style={{textAlign: "right"}}>
            <div style={{
              fontFamily: "var(--ff-display)",
              fontSize: 36,
              fontWeight: 700,
              lineHeight: 1,
              color: ok ? "var(--ok)" : "var(--err)",
              fontVariantNumeric: "tabular-nums",
              letterSpacing: "-0.02em",
            }}>
              {total}%
            </div>
            <div style={{marginTop: 6}}>
              {ok
                ? <Pill tone="ok" dot>Total tepat 100%</Pill>
                : <Pill tone="err" dot>Selisih {total - 100 > 0 ? `+${total - 100}` : total - 100}%</Pill>}
            </div>
          </div>
        </div>
      </div>

      <div className="setting-card">
        <div className="setting-card-hd">Aturan turunan</div>
        <div className="field-grid">
          <Field label="Dosen boleh override komposisi" hint="Dengan persetujuan Kaprodi">
            <Toggle value={true} onChange={()=>{}}/>
          </Field>
          <Field label="Minimum komponen UTS atau UAS" hint="Tidak boleh kurang dari nilai ini">
            <NumberWithSuffix defaultValue={20} suffix="%"/>
          </Field>
          <Field label="Komponen kehadiran wajib ada" hint="Tidak boleh dihilangkan sepenuhnya">
            <Toggle value={true} onChange={()=>{}}/>
          </Field>
        </div>
      </div>

      {adding && <KomponenModal onClose={() => setAdding(false)} onSave={(data) => { addComp(data); setAdding(false); }}/>}
      {editing && <KomponenModal initial={editing} onClose={() => setEditing(null)} onSave={(data) => { updateComp(editing.id, data); setEditing(null); }}/>}
    </>
  );
}

function SetAbsensi() {
  const [comps, setComps] = useState([
    { id: "buka",     label: "Buka Sesi",       desc: "Mahasiswa membuka halaman sesi minggu",       icon: "external", weight: 15 },
    { id: "baca",     label: "Baca Materi",     desc: "Membuka file modul / membaca konten teks",    icon: "book",     weight: 20 },
    { id: "nonton",   label: "Nonton Materi",   desc: "Menonton video — proporsional ke durasi",     icon: "presence", weight: 35, proportional: true },
    { id: "download", label: "Download Materi", desc: "Mengunduh attachment / handout",              icon: "download", weight: 10 },
    { id: "komentar", label: "Komentar",        desc: "Posting komentar di forum diskusi sesi",      icon: "mail",     weight: 20 },
  ]);

  const total = comps.reduce((s, c) => s + c.weight, 0);
  const ok = total === 100;

  const setW = (id, v) => setComps(cs => cs.map(c => c.id === id ? { ...c, weight: Math.max(0, Math.min(100, v)) } : c));

  // Auto-balance helper
  const autoBalance = () => {
    const each = Math.floor(100 / comps.length);
    const rest = 100 - each * comps.length;
    setComps(cs => cs.map((c, i) => ({ ...c, weight: each + (i === 0 ? rest : 0) })));
  };

  return (
    <>
      <PanelHeader icon="presence" title="Pengaturan Absensi"
                   desc="Sistem perkuliahan full online — kehadiran mahasiswa dihitung otomatis dari aktivitas di LMS. Atur 5 komponen di bawah dan bobotnya, total harus 100%."/>

      {/* Komponen + bobot */}
      <div className="setting-card">
        <div className="setting-card-hd">
          <span>Komponen kehadiran & bobot</span>
          <div className="row-flex">
            <Pill tone={ok ? "ok" : "err"} dot>Total: {total}%{ok ? "" : " — harus 100%"}</Pill>
            <button className="btn sm ghost" onClick={autoBalance}><Icon name="refresh" size={12}/>Auto-balance</button>
          </div>
        </div>

        {/* Stack bar visual */}
        <div className="stack-bar">
          {comps.map((c, i) => (
            <div key={c.id}
                 style={{
                   width: (c.weight / Math.max(total, 1)) * 100 + "%",
                   background: ["var(--navy-700)","var(--navy-500)","var(--gold-500)","var(--ok)","var(--gold-600)"][i],
                 }}
                 title={`${c.label}: ${c.weight}%`}/>
          ))}
        </div>

        <div style={{padding: "20px"}}>
          <div style={{display: "grid", gap: 14}}>
            {comps.map((c, i) => (
              <div key={c.id} style={{
                display: "grid",
                gridTemplateColumns: "44px 1fr 200px 70px 36px",
                gap: 14, alignItems: "center",
                padding: "14px 16px",
                border: "1px solid var(--line)",
                borderRadius: 12,
                background: "var(--paper)",
              }}>
                <div style={{
                  width: 44, height: 44, borderRadius: 10,
                  background: ["var(--navy-700)","var(--navy-500)","var(--gold-500)","var(--ok)","var(--gold-600)"][i],
                  color: i === 2 || i === 4 ? "var(--navy-900)" : "#fff",
                  display: "grid", placeItems: "center",
                }}>
                  <Icon name={c.icon} size={20}/>
                </div>
                <div>
                  <div className="row-flex" style={{gap: 8, marginBottom: 2}}>
                    <b style={{fontSize: 14, fontWeight: 600}}>{c.label}</b>
                    {c.proportional && <Pill tone="gold">Proporsional</Pill>}
                  </div>
                  <div className="muted" style={{fontSize: 12.5}}>{c.desc}</div>
                </div>
                <input type="range" min="0" max="60" value={c.weight}
                       onChange={e => setW(c.id, Number(e.target.value))}
                       style={{appearance: "none", width: "100%", height: 6, background: "var(--paper-2)", borderRadius: 999}}/>
                <div style={{display: "flex", alignItems: "center", border: "1px solid var(--line)", borderRadius: 8, overflow: "hidden", background: "#fff"}}>
                  <input type="number" value={c.weight} onChange={e => setW(c.id, Number(e.target.value))}
                         style={{width: "calc(100% - 22px)", border: 0, padding: "8px", outline: "none", fontSize: 14, fontWeight: 600, textAlign: "center", fontFamily: "var(--ff-mono)"}}/>
                  <span style={{padding: "0 6px", color: "var(--muted)", fontSize: 12}}>%</span>
                </div>
                <button className="btn sm ghost" style={{padding: "6px"}}><Icon name="more" size={14}/></button>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Logika Nonton Video */}
      <div className="setting-card">
        <div className="setting-card-hd">Logika perhitungan — Nonton Materi (proporsional)</div>
        <div style={{padding: "20px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20}}>
          <div>
            <p style={{margin: "0 0 12px", color: "var(--muted)", fontSize: 13.5, lineHeight: 1.55}}>
              Khusus untuk komponen <b style={{color: "var(--ink)"}}>Nonton Materi</b>, nilai dihitung proporsional terhadap durasi tonton mahasiswa.
            </p>
            <div style={{padding: "16px 18px", background: "var(--navy-700)", color: "#fff", borderRadius: 12, fontFamily: "var(--ff-mono)", fontSize: 13, lineHeight: 1.7}}>

          </div>
          <div>

              </Field>
              <Field label="Threshold maksimum tonton" hint="Di atas ini dianggap 100%">
                <NumberWithSuffix defaultValue={90} suffix="%"/>
              </Field>
              <Field label="Hitung skip / fast-forward" hint="Berapa lama dianggap menonton">
                <select defaultValue="real">
                  <option value="real">Hanya durasi real-time</option>
                  <option value="any">Semua (termasuk skip)</option>
                </select>
              </Field>
            </div>
          </div>
        </div>
      </div>

      {/* Algoritma & Skema DB */}
      <div className="setting-card">
        <div className="setting-card-hd">Skema database & algoritma perhitungan</div>
        <div style={{padding: "20px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20}}>
          <div>
            <div className="muted" style={{fontSize: 11, fontFamily: "var(--ff-sans)", textTransform: "uppercase", letterSpacing: ".14em", fontWeight: 600, marginBottom: 10}}>
              Skema tabel
            </div>
            <pre style={{
              margin: 0, padding: "16px 18px",
              background: "#0B192C", color: "#cbd5e1",
              borderRadius: 12, fontSize: 12, lineHeight: 1.7,
              overflow: "auto", fontFamily: "var(--ff-mono)",
            }}>
{`-- Master konfigurasi
attendance_components (
  id              uuid PK,
  course_id       uuid FK NULL, -- null = global
  component       enum('buka','baca',
                       'nonton','download','komentar'),
  weight          decimal(5,2), -- 0..100
  proportional    boolean,
  updated_at      timestamp
)

-- Log aktivitas LMS (event-based)
attendance_events (
  id              bigserial PK,
  student_id      uuid FK,
  course_id       uuid FK,
  session_id      uuid FK,
  component       enum(...),
  occurred_at     timestamp,
  duration_sec    int NULL,     -- utk nonton
  total_sec       int NULL,     -- utk nonton
  meta            jsonb
)`}
            </pre>
          </div>
          <div>
            <div className="muted" style={{fontSize: 11, fontFamily: "var(--ff-sans)", textTransform: "uppercase", letterSpacing: ".14em", fontWeight: 600, marginBottom: 10}}>
              Algoritma agregat
            </div>
            <pre style={{
              margin: 0, padding: "16px 18px",
              background: "#0B192C", color: "#cbd5e1",
              borderRadius: 12, fontSize: 12, lineHeight: 1.7,
              overflow: "auto", fontFamily: "var(--ff-mono)",
            }}>
{`function hitungKehadiran(mhs, mk, sesi) {
  const cfg = getComponents(mk.id);
  let total = 0;

  for (const c of cfg) {
    const e = findEvent(mhs, sesi, c.component);
    if (!e) continue;

    if (c.proportional && c.component === 'nonton') {
      const ratio = clamp(
        e.duration_sec / e.total_sec, 0, 1
      );
      total += ratio * c.weight;
    } else {
      total += c.weight; // hadir = full
    }
  }
  return Math.min(100, total);
}

// Job harian: agregat semua mhs × sesi × mk
// → tulis ke materialized view 'attendance_score'`}
            </pre>
          </div>
        </div>
      </div>

      <div className="setting-card">
        <div className="setting-card-hd">Alur sinkronisasi LMS → SIAKAD</div>
        <div style={{padding: "20px"}}>
          <div style={{display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, alignItems: "stretch"}}>
            <FlowStep n={1} title="Event ingest" desc="LMS push webhook setiap aktivitas — append ke attendance_events"/>
            <FlowStep n={2} title="Batch aggregate" desc="Worker tiap 15 menit: hitung skor per mhs × sesi × MK"/>
            <FlowStep n={3} title="Materialized view" desc="Update attendance_score (denormalisasi untuk read cepat)"/>
            <FlowStep n={4} title="API ke SIAKAD" desc="Endpoint GET /attendance/:course/:student → tabel detail"/>
          </div>
        </div>
      </div>
    </>
  );
}

function FlowStep({ n, title, desc }) {
  return (
    <div style={{padding: "16px", border: "1px solid var(--line)", borderRadius: 12, background: "var(--paper)", position: "relative"}}>
      <div style={{
        width: 28, height: 28, borderRadius: 8,
        background: "var(--gold-500)", color: "#0a2540",
        display: "grid", placeItems: "center",
        fontFamily: "var(--ff-display)", fontWeight: 700, fontSize: 13,
        marginBottom: 10,
      }}>{n}</div>
      <div style={{fontSize: 13.5, fontWeight: 600, marginBottom: 4}}>{title}</div>
      <div className="muted" style={{fontSize: 12, lineHeight: 1.5}}>{desc}</div>
    </div>
  );
}

function Toggle({ value, onChange }) {
  return (
    <button className={cls("toggle", value && "on")} onClick={() => onChange(!value)} type="button">
      <span className="dot"/>
      <span className="lbl">{value ? "Aktif" : "Nonaktif"}</span>
    </button>
  );
}

    dashboard:   ScreenDashboard,
    matakuliah:  ScreenMataKuliah,
    kurikulum:   ScreenKurikulum,
    jadwal:      ScreenJadwal,
    kelas:       ScreenKelas,
    learning:    ScreenLearning,
    nilai:       ScreenNilai,
    absensi:     ScreenAbsensi,
    mahasiswa:   ScreenMahasiswa,
    dosen:       ScreenDosen,
    pendaftaran: ScreenPendaftaran,
    persuratan:  ScreenPersuratan,
    spp:         ScreenSPP,
    pddikti:     ScreenPDDikti,
    laporan:     ScreenLaporan,
    pengaturan:  ScreenPengaturan,
    "k-dashboard":  ScreenKaprodiDashboard,
    "k-approval":   ScreenKaprodiApproval,
    "k-plotting":   ScreenKaprodiPlotting,
    "k-mhs":        ScreenKaprodiMhs,
    "k-skripsi":    ScreenKaprodiSkripsi,
    "k-akreditasi": ScreenKaprodiAkreditasi,
  }[route] || (role === "kaprodi" ? ScreenKaprodiDashboard : ScreenDashboard);

  return (
    <div className="app"
         data-sidebar={sidebar}
         data-density={t.density}
         data-layout={t.layout}
         data-role={role}
         style={{
           "--brand": accent.brand,
           "--brand-ink": accent.brandInk,
           "--gold-500": accent.gold,
           "--gold-50":  accent.goldSoft,
         }}
         data-screen-label={`SIAKAD / ${role} / ${route}`}
    >
      <Sidebar route={route} setRoute={setRoute} role={role}/>
      <Topbar route={route} setSidebar={setSidebar} sidebarState={sidebar} search={search} setSearch={setSearch} role={role} setRole={switchRole}/>
      <main className="content">
        <div className="content-inner">
          <Screen setRoute={setRoute}/>
        </div>
      </main>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Persona"/>
        <TweakRadio label="Role" value={role}
                    options={[{value:"admin", label:"Admin BAAK"}, {value:"kaprodi", label:"Kaprodi"}]}
                    onChange={switchRole}/>

        <TweakSection label="Tampilan"/>
        <TweakRadio label="Mode" value={t.theme}
                    options={[{value:"light", label:"Light"}, {value:"dark", label:"Dark"}]}
                    onChange={(v) => setTweak("theme", v)}/>
        <TweakColor label="Aksen" value={t.accent}
                    options={[
                      {value:"gold",   color:"#FED42A"},
                      {value:"emerald",color:"#10b981"},
                      {value:"copper", color:"#f97316"},
                      {value:"plum",   color:"#a855f7"},
                    ].map(o => o.color)}
                    onChange={(v) => {
                      const map = {"#FED42A":"gold","#10b981":"emerald","#f97316":"copper","#a855f7":"plum"};
                      setTweak("accent", map[v] || "gold");
                    }}/>

        <TweakSection label="Layout"/>
        <TweakSelect label="Sidebar" value={t.sidebar}
                    options={[
                      {value:"expanded",  label:"Expanded"},
                      {value:"collapsed", label:"Icon-only"},
                      {value:"hidden",    label:"Hidden"},
                    ]}
                    onChange={(v) => setTweak("sidebar", v)}/>
        <TweakRadio label="Density" value={t.density}
                    options={[{value:"compact", label:"Compact"}, {value:"regular", label:"Regular"}]}
                    onChange={(v) => setTweak("density", v)}/>
        <TweakSelect label="Lebar konten" value={t.layout}
                    options={[
                      {value:"wide",     label:"Wide (1480)"},
                      {value:"centered", label:"Centered (1200)"},
                      {value:"full",     label:"Full width"},
                    ]}
                    onChange={(v) => setTweak("layout", v)}/>

        <TweakSection label="Navigasi cepat"/>
        <div style={{display:"grid", gap: 6}}>
          {[
            ["dashboard", "Dashboard"],
            ["matakuliah","Mata Kuliah (hero)"],
            ["mahasiswa", "Mahasiswa"],
            ["jadwal",    "Jadwal & Kelas"],
            ["nilai",     "Nilai & KHS"],
            ["persuratan","Persuratan"],
            ["pddikti",   "Sinkron PDDikti"],
            ["pengaturan","Pengaturan SIAKAD"],
          ].map(([id, label]) => (
            <button key={id}
                    onClick={() => setRoute(id)}
                    style={{
                      textAlign:"left",
                      padding:"6px 8px",
                      borderRadius:6,
                      border:"1px solid " + (route === id ? "rgba(176,138,46,.5)" : "transparent"),
                      background: route === id ? "rgba(176,138,46,.15)" : "transparent",
                      cursor:"pointer",
                      color:"inherit",
                      font:"inherit",
                      fontSize:11.5,
                    }}>
              {label}
            </button>
          ))}
        </div>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

  </script>

</body>
</html>
