<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AKADEMIK UNSIA — SIAKAD Admin Console</title>

  <!-- Fonts: Google Fonts CDN (replaces self-hosted woff2) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Urbanist:wght@500;600;700;800&display=swap" rel="stylesheet">

  <!-- React 18 DEVELOPMENT build + Babel standalone.
       Dev build gives readable console errors (prod build fails silently). -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js" crossorigin></script>

  <!-- Visible error overlay — surfaces JS errors at bottom of page
       so we don't get a silently blank screen. Remove for production. -->
  <script>
    window.addEventListener('error', function (e) {
      var box = document.getElementById('__err_box');
      if (!box) {
        box = document.createElement('div');
        box.id = '__err_box';
        box.style.cssText = 'position:fixed;left:12px;right:12px;bottom:12px;z-index:99999;'
          + 'background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;'
          + 'border:1px solid #5c2b2e;font:12px/1.45 ui-monospace,monospace;'
          + 'white-space:pre-wrap;max-height:40vh;overflow:auto;box-shadow:0 8px 24px rgba(0,0,0,.4)';
        (document.body || document.documentElement).appendChild(box);
      }
      box.textContent += '[error] ' + (e.message || e.type)
        + (e.filename ? ' (' + e.filename.slice(-60) + ':' + e.lineno + ')' : '') + '\n';
    }, true);
    window.addEventListener('unhandledrejection', function (e) {
      var box = document.getElementById('__err_box');
      if (!box) {
        box = document.createElement('div');
        box.id = '__err_box';
        box.style.cssText = 'position:fixed;left:12px;right:12px;bottom:12px;z-index:99999;'
          + 'background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;'
          + 'border:1px solid #5c2b2e;font:12px/1.45 ui-monospace,monospace;'
          + 'white-space:pre-wrap;max-height:40vh;overflow:auto;box-shadow:0 8px 24px rgba(0,0,0,.4)';
        (document.body || document.documentElement).appendChild(box);
      }
      box.textContent += '[promise] ' + (e.reason && e.reason.message || e.reason) + '\n';
    });
  </script>

  <!-- ============================================================
       AKADEMIK UNSIA — Design System CSS (Academic Navy + Gold)
       Inlined verbatim from original bundled file.
       ============================================================ -->
  <style>
/* ============================================================
   AKADEMIK UNSIA — SIAKAD Admin Console
   Design system: Academic Navy + Gold, airy & generous.
   ============================================================ */

/* ---------- Tokens ---------- */
:root {
  /* Brand — Premium Enterprise palette */
  --navy-50:  #eef2f7;
  --navy-100: #d6deea;
  --navy-200: #aebdd1;
  --navy-300: #6c83a4;
  --navy-500: #234974;
  --navy-600: #102a43;
  --navy-700: #0B192C;
  --navy-800: #081222;
  --navy-900: #050b17;

  --gold-50:  #fff8d6;
  --gold-100: #ffec8e;
  --gold-300: #ffe066;
  --gold-500: #FED42A;
  --gold-600: #d6b300;
  --gold-700: #8a7400;

  /* Neutrals — cool slate */
  --paper:    #f1f5f9;
  --paper-2:  #e2e8f0;
  --surface:  #ffffff;
  --line:     #e2e8f0;
  --line-2:   #cbd5e1;
  --ink:      #0f172a;
  --ink-2:    #1e293b;
  --muted:    #64748b;
  --muted-2:  #94a3b8;

  /* Status — emerald / amber / rose */
  --ok:   #059669;
  --ok-bg:#d1fae5;
  --warn: #d97706;
  --warn-bg:#fef3c7;
  --err:  #e11d48;
  --err-bg:#ffe4e6;
  --info: #102a43;
  --info-bg:#dbeafe;

  /* Type */
  --ff-display: "Urbanist", "Inter", ui-sans-serif, system-ui, sans-serif;
  --ff-sans:    "Inter", ui-sans-serif, system-ui, sans-serif;
  --ff-mono:    "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* Spacing scale (airy) */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-7: 48px;
  --space-8: 64px;

  --radius-sm: 6px;
  --radius:    10px;
  --radius-lg: 16px;
  --radius-xl: 24px;

  --shadow-1: 0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.04);
  --shadow-2: 0 4px 14px rgba(15,23,42,.06);
  --shadow-card: 0 1px 2px rgba(15,23,42,.04), 0 4px 12px rgba(15,23,42,.04);
  --shadow-hover: 0 8px 24px rgba(15,23,42,.08);
  --shadow-brand: 0 8px 20px rgba(16,42,67,.20);

  --sidebar-w: 272px;
  --sidebar-w-collapsed: 76px;
  --topbar-h: 80px;

  --brand: var(--navy-700);
  --brand-ink: #ffffff;
  --accent: var(--gold-500);

  --density-row: 56px;
  --density-pad: 16px;
}

[data-density="compact"] {
  --density-row: 44px;
  --density-pad: 10px;
  --space-5: 16px;
  --space-6: 20px;
  --space-7: 32px;
}

[data-theme="dark"] {
  --paper:    #0b1320;
  --paper-2:  #0f1a2c;
  --surface:  #121e34;
  --line:     #1f2c45;
  --line-2:   #2a3c5b;
  --ink:      #ecebe2;
  --ink-2:    #c9cfdf;
  --muted:    #8b95ad;
  --muted-2:  #6c7790;

  --navy-50:  #1a2740;
  --navy-100: #213254;
  --navy-200: #2c4170;
  --navy-700: #d8e3f5;
  --navy-800: #ecf1fa;

  --ok-bg:#163524;
  --warn-bg:#3b2e10;
  --err-bg:#3b1717;
  --info-bg:#172a45;

  --shadow-1: 0 1px 0 rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.5);
  --shadow-2: 0 4px 14px rgba(0,0,0,.4);

  --brand: var(--gold-500);
  --brand-ink: #0a1227;
  --accent: var(--gold-300);
}

/* ---------- Reset ---------- */
* { box-sizing: border-box; }
html, body, #root { height: 100%; margin: 0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--ff-sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "cv02", "cv11";
  letter-spacing: -0.005em;
}
button { font: inherit; color: inherit; }
input, select, textarea { font: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

/* ---------- App shell ---------- */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--topbar-h) 1fr;
  grid-template-areas:
    "sidebar topbar"
    "sidebar content";
  height: 100vh;
  transition: grid-template-columns .25s ease;
}
.app[data-sidebar="collapsed"] { grid-template-columns: var(--sidebar-w-collapsed) 1fr; }
.app[data-sidebar="hidden"]    { grid-template-columns: 0 1fr; }
.app[data-layout="wide"]       { --content-max: 1480px; }
.app[data-layout="centered"]   { --content-max: 1200px; }
.app[data-layout="full"]       { --content-max: 100%; }

/* ---------- Sidebar ---------- */
.sidebar {
  grid-area: sidebar;
  background: linear-gradient(180deg, #1664a5 0%, #0f487b 45%, #0a3258 100%);
  color: rgba(226,232,240,.88);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 18px 14px 16px;
  gap: 12px;
  box-shadow: inset -1px 0 0 rgba(0,0,0,.15);
}
[data-theme="dark"] .sidebar { background: linear-gradient(180deg, #082a4a 0%, #051e36 50%, #030f1c 100%); }
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 4px 8px 14px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  flex-shrink: 0;
}
.sidebar-brand .mark {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: #ffffff;
  color: var(--navy-800);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.sidebar-brand .word {
  font-family: var(--ff-display);
  font-size: 15px;
  letter-spacing: .01em;
  white-space: nowrap;
  color: #fff;
  line-height: 1.2;
}
.sidebar-brand .word small {
  display: block;
  font-family: var(--ff-mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .18em;
  color: rgba(216,227,245,.55);
  font-weight: 400;
  margin-top: 2px;
}

/* Profile pill at top of sidebar */
.sidebar-profile {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 10px;
  flex-shrink: 0;
}
.sidebar-profile .avatar-lg {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-500), var(--gold-600));
  color: #0a2540;
  display: grid; place-items: center;
  font-family: var(--ff-display);
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
  position: relative;
}
.sidebar-profile .avatar-lg::after {
  content: "";
  position: absolute;
  bottom: 0; right: 0;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: #10b981;
  border: 2px solid #0f487b;
}
.sidebar-profile .meta { line-height: 1.3; min-width: 0; flex: 1; }
.sidebar-profile .meta b { display: block; color: #fff; font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-profile .meta small { display: block; font-family: var(--ff-sans); font-size: 10.5px; letter-spacing: .12em; color: rgba(226,232,240,.55); text-transform: uppercase; margin-top: 3px; font-weight: 600; }

.sidebar-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 4px 0 12px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.15) transparent;
}
.sidebar-scroll::-webkit-scrollbar { width: 6px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }
.sidebar-section {
  font-family: var(--ff-sans);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .16em;
  color: rgba(226,232,240,.45);
  padding: 16px 14px 8px;
  font-weight: 600;
}
.app[data-sidebar="collapsed"] .sidebar-section,
.app[data-sidebar="collapsed"] .sidebar-brand .word,
.app[data-sidebar="collapsed"] .sidebar-profile .meta,
.app[data-sidebar="collapsed"] .navitem .label,
.app[data-sidebar="collapsed"] .navitem .badge,
.app[data-sidebar="collapsed"] .cta-button .label,
.app[data-sidebar="collapsed"] .sidebar-foot button .label { display: none; }
.app[data-sidebar="collapsed"] .sidebar { padding: 18px 10px 16px; }
.app[data-sidebar="collapsed"] .sidebar-brand { justify-content: center; padding: 4px 0 14px; }
.app[data-sidebar="collapsed"] .sidebar-profile { justify-content: center; padding: 12px 0; }
.app[data-sidebar="collapsed"] .navitem { justify-content: center; padding: 11px; }

.navitem {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 11px 14px;
  border-radius: 10px;
  font-size: 13.5px;
  color: rgba(216,227,245,.78);
  cursor: pointer;
  position: relative;
  margin: 2px 0;
  font-weight: 500;
}
.navitem:hover { background: rgba(255,255,255,.06); color: #fff; }
.navitem.active {
  background: rgba(254,212,42,.18);
  color: #fff;
}
.navitem.active::before {
  content: "";
  position: absolute;
  left: -14px;
  top: 10px; bottom: 10px;
  width: 3px;
  background: var(--gold-500);
  border-radius: 0 2px 2px 0;
  box-shadow: 0 0 12px rgba(254,212,42,.6);
}
.navitem .icon { width: 18px; height: 18px; flex-shrink: 0; opacity: .8; }
.navitem.active .icon { opacity: 1; color: var(--gold-300); }
.navitem .label { flex: 1; }
.navitem .badge {
  font-family: var(--ff-mono);
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 999px;
  background: rgba(255,255,255,.1);
  color: rgba(255,255,255,.7);
  font-weight: 500;
}
.navitem.active .badge { background: var(--gold-500); color: var(--navy-900); }
.navitem .lock { opacity: .35; width: 14px; height: 14px; }

/* CTA Button - special gold action in sidebar */
.cta-button {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 13px 16px;
  margin: 8px 0;
  border-radius: 12px;
  background: var(--gold-500);
  color: #0a2540;
  font-size: 13.5px;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s ease;
  border: 0;
  width: 100%;
  font-family: inherit;
  text-align: left;
  box-shadow: 0 6px 18px rgba(254,212,42,.35);
}
.cta-button:hover { background: var(--gold-300); transform: translateY(-1px); box-shadow: 0 10px 24px rgba(254,212,42,.4); }
.cta-button .icon { flex-shrink: 0; }
.cta-button .label { flex: 1; }

.sidebar-foot {
  padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,.08);
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}
.sidebar-foot button {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  border-radius: 8px;
  font-size: 13px;
  background: transparent;
  border: 1px solid rgba(255,255,255,.12);
  color: rgba(216,227,245,.78);
  cursor: pointer;
  font-family: inherit;
  width: 100%;
  text-align: left;
  font-weight: 500;
}
.sidebar-foot button:hover { background: rgba(255,255,255,.05); color: #fff; }
.sidebar-foot button.danger { color: #fb7185; border-color: rgba(251,113,133,.3); }
.sidebar-foot button.danger:hover { background: rgba(251,113,133,.08); color: #f43f5e; }
.sidebar-foot button .icon { width: 16px; height: 16px; flex-shrink: 0; }
.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--navy-500);
  display: grid; place-items: center;
  color: #fff;
  font-weight: 600;
  font-size: 12px;
  flex-shrink: 0;
}

/* ---------- Topbar ---------- */
.topbar {
  grid-area: topbar;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 0 32px;
}
.topbar .title-block { display: flex; flex-direction: column; gap: 4px; min-width: 0; flex-shrink: 1; }
.topbar .title-block .t {
  font-family: var(--ff-display);
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.02em;
  line-height: 1.1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar .title-block .sub { font-family: var(--ff-sans); font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
@media (max-width: 1100px) {
  .topbar .search { display: none; }
  .topbar { padding: 0 20px; gap: 12px; }
}
@media (max-width: 880px) {
  .user-pill .info { display: none; }
}
.topbar .search {
  flex: 1;
  max-width: 360px;
  position: relative;
  margin-left: 16px;
}
.topbar .search input {
  width: 100%;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 9px 14px 9px 38px;
  outline: none;
  font-size: 13px;
}
.topbar .search input:focus { border-color: var(--navy-500); background: var(--surface); }
.topbar .search .icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; color: var(--muted);
}
.topbar .search kbd {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--muted);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 2px 6px;
  background: var(--surface);
}
.topbar-spacer { flex: 1; }
.topbar .actions { display: flex; align-items: center; gap: 12px; }
.user-pill {
  display: flex; align-items: center; gap: 12px;
  padding: 6px 6px 6px 12px;
  border-radius: 999px;
  cursor: pointer;
}
.user-pill:hover { background: var(--paper-2); }
.user-pill .info { text-align: right; line-height: 1.2; }
.user-pill .info b { display: block; font-weight: 600; font-size: 13px; color: var(--ink); }
.user-pill .info small { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; }
.user-pill .avatar { width: 36px; height: 36px; background: linear-gradient(135deg, var(--gold-500), var(--gold-600)); color: #0a2540; font-size: 12px; font-weight: 700; }

.year-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px 6px 12px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--paper);
  font-size: 12.5px;
  cursor: pointer;
}
.year-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); }
.year-pill b { font-weight: 500; }
.year-pill small { color: var(--muted); font-family: var(--ff-mono); font-size: 11px; }

.icon-btn {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: grid; place-items: center;
  background: transparent;
  border: 1px solid transparent;
  cursor: pointer;
  color: var(--ink-2);
  position: relative;
}
.icon-btn:hover { background: var(--paper); border-color: var(--line); }
.icon-btn .dot {
  position: absolute; top: 8px; right: 8px;
  width: 8px; height: 8px; border-radius: 50%; background: var(--gold-500);
  border: 2px solid var(--surface);
}

/* ---------- Content ---------- */
.content {
  grid-area: content;
  overflow-y: auto;
  background: var(--paper);
}
.content-inner {
  max-width: var(--content-max, 1480px);
  padding: var(--space-6) var(--space-6) var(--space-8);
  margin: 0 auto;
}
.app[data-density="compact"] .content-inner { padding: var(--space-5); }

/* ---------- Page header ---------- */
.page-hd {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: var(--space-6);
  flex-wrap: wrap;
}
.page-hd .eyebrow {
  font-family: var(--ff-sans);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .16em;
  color: var(--muted);
  margin-bottom: 8px;
  font-weight: 600;
}
.page-hd h1 {
  font-family: var(--ff-display);
  font-size: 32px;
  line-height: 1.1;
  margin: 0 0 8px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--ink);
}
.page-hd p.lede {
  margin: 0;
  color: var(--muted);
  max-width: 60ch;
  font-size: 14px;
}
.page-hd .right {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  border: 2px solid var(--line);
  background: var(--surface);
  color: var(--ink-2);
  cursor: pointer;
  transition: all .15s ease;
  white-space: nowrap;
  letter-spacing: -0.005em;
}
.btn:hover { background: var(--paper); border-color: var(--line-2); }
.btn.primary {
  background: var(--navy-600);
  color: #fff;
  border-color: var(--navy-600);
  box-shadow: var(--shadow-brand);
}
.btn.primary:hover { background: var(--navy-700); box-shadow: 0 10px 24px rgba(11,25,44,.28); }
[data-theme="dark"] .btn.primary { background: var(--gold-500); color: var(--navy-900); border-color: var(--gold-500); box-shadow: 0 8px 20px rgba(236,201,75,.25); }
[data-theme="dark"] .btn.primary:hover { background: var(--gold-300); }
.btn.gold {
  background: var(--gold-500);
  color: var(--navy-900);
  border-color: var(--gold-500);
  box-shadow: 0 8px 20px rgba(236,201,75,.25);
}
.btn.ghost { background: transparent; border-color: transparent; }
.btn.ghost:hover { background: var(--paper-2); }
.btn .icon { width: 14px; height: 14px; }
.btn.sm { padding: 6px 11px; font-size: 12px; border-radius: 9px; border-width: 1.5px; }
.btn.lg { padding: 14px 22px; font-size: 14px; border-radius: 14px; }

/* ---------- Cards ---------- */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-card);
  overflow: hidden;
}
.card-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--line);
  gap: 12px;
}
.card-hd h3 {
  font-family: var(--ff-display);
  font-size: 17px;
  font-weight: 700;
  margin: 0;
  letter-spacing: -0.015em;
  color: var(--ink);
}
.card-hd .sub {
  color: var(--muted);
  font-size: 12.5px;
  margin-top: 3px;
}
.card-bd { padding: 24px; }
.card-bd.tight { padding: 0; }

/* ---------- KPI ---------- */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-4);
  margin-bottom: var(--space-5);
}
.kpi {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  padding: 24px 24px 22px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-card);
  transition: all .2s ease;
}
.kpi:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
.kpi .label {
  font-family: var(--ff-sans);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--muted);
  font-weight: 600;
}
.kpi .value {
  font-family: var(--ff-display);
  font-size: 42px;
  font-weight: 700;
  line-height: 1.1;
  margin-top: 14px;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
}
.kpi .delta {
  margin-top: 10px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
}
.kpi .delta b { color: var(--ok); font-weight: 600; }
.kpi .delta.down b { color: var(--err); }
.kpi .accent {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: var(--navy-600);
}
.kpi .accent.gold { background: var(--gold-500); }
.kpi .accent.ok { background: var(--ok); }
.kpi .accent.warn { background: var(--warn); }
.kpi .accent.err { background: var(--err); }

/* ---------- Table ---------- */
.tbl-wrap { overflow-x: auto; }
table.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 13.5px;
}
table.tbl th {
  text-align: left;
  font-family: var(--ff-sans);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--muted);
  font-weight: 600;
  padding: 14px var(--density-pad);
  border-bottom: 1px solid var(--line);
  white-space: nowrap;
  background: var(--paper);
  cursor: pointer;
  user-select: none;
}
[data-theme="dark"] table.tbl th { background: var(--paper-2); }
table.tbl th:hover { color: var(--ink); }
table.tbl th.sorted { color: var(--ink); }
table.tbl th .sort {
  display: inline-block;
  margin-left: 6px;
  opacity: .5;
}
table.tbl td {
  padding: 0 var(--density-pad);
  height: var(--density-row);
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
  white-space: nowrap;
}
table.tbl tbody tr:hover { background: var(--paper-2); cursor: pointer; }
table.tbl tbody tr.selected { background: var(--info-bg); }
table.tbl td.num { font-variant-numeric: tabular-nums; }
table.tbl td.mono, table.tbl td .nim { font-family: var(--ff-mono); font-size: 12px; }

/* ---------- Tabs ---------- */
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--line);
  margin-bottom: var(--space-5);
}
.tab {
  padding: 12px 18px;
  font-size: 13.5px;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  position: relative;
  top: 1px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
}
.tab:hover { color: var(--ink); }
.tab.active { color: var(--navy-600); border-bottom-color: var(--gold-500); }
.tab .count {
  font-family: var(--ff-mono);
  font-size: 10.5px;
  padding: 2px 7px;
  border-radius: 999px;
  background: var(--paper-2);
  color: var(--muted);
  font-weight: 500;
}
.tab.active .count { background: var(--gold-50); color: var(--gold-700); }

/* ---------- Pills / status ---------- */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px;
  font-size: 11.5px;
  border-radius: 999px;
  background: var(--paper-2);
  color: var(--ink-2);
  border: 1px solid transparent;
  font-weight: 600;
  white-space: nowrap;
  letter-spacing: -0.005em;
}
.pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .9; }
.pill.ok    { background: var(--ok-bg);   color: var(--ok);   border-color: rgba(5,150,105,.15); }
.pill.warn  { background: var(--warn-bg); color: var(--warn); border-color: rgba(217,119,6,.15); }
.pill.err   { background: var(--err-bg);  color: var(--err);  border-color: rgba(225,29,72,.15); }
.pill.info  { background: var(--info-bg); color: var(--info); border-color: rgba(16,42,67,.15); }
.pill.gold  { background: var(--gold-50); color: var(--gold-700); border-color: rgba(236,201,75,.3); }
.pill.outline { background: transparent; border-color: var(--line-2); color: var(--muted); }

/* ---------- Filters / chips ---------- */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  background: var(--surface);
  flex-wrap: wrap;
}
.input, .select {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 13px;
  outline: none;
  min-width: 140px;
}
.input:focus, .select:focus { border-color: var(--navy-500); background: var(--surface); }
.input.search { padding-left: 32px; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='%236b7689' stroke-width='1.5'><circle cx='7' cy='7' r='5'/><path d='m11 11 3 3'/></svg>"); background-repeat: no-repeat; background-position: 10px center; min-width: 240px; }

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--surface);
  font-size: 12px;
  cursor: pointer;
  color: var(--ink-2);
}
.chip:hover { background: var(--paper-2); }
.chip.active { background: var(--navy-700); color: #fff; border-color: var(--navy-700); }
[data-theme="dark"] .chip.active { background: var(--gold-500); color: var(--navy-900); border-color: var(--gold-500); }

/* ---------- Cycle / progress strip ---------- */
.cycle-strip {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 0;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--surface);
}
.cycle-step {
  padding: 18px 18px 16px;
  border-right: 1px solid var(--line);
  position: relative;
}
.cycle-step:last-child { border-right: 0; }
.cycle-step .ix {
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: .15em;
  color: var(--muted);
}
.cycle-step h4 {
  margin: 6px 0 6px;
  font-size: 13.5px;
  font-weight: 500;
  font-family: var(--ff-sans);
}
.cycle-step .date { font-family: var(--ff-mono); font-size: 11px; color: var(--muted); }
.cycle-step.done    { background: var(--paper-2); }
.cycle-step.now     { background: linear-gradient(180deg, var(--navy-700), var(--navy-800)); color: #fff; }
.cycle-step.now .ix, .cycle-step.now .date { color: rgba(255,255,255,.65); }
.cycle-step.now::after {
  content: "";
  position: absolute;
  left: 18px; right: 18px; bottom: 12px;
  height: 3px;
  border-radius: 2px;
  background: rgba(255,255,255,.15);
  background-image: linear-gradient(90deg, var(--gold-500) 0%, var(--gold-500) var(--p, 50%), transparent var(--p, 50%));
  background-repeat: no-repeat;
}

/* ---------- Modal ---------- */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(13,27,42,.4);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: grid; place-items: center;
  padding: 24px;
}
.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 560px;
  max-height: 85vh;
  overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: 0 24px 64px rgba(0,0,0,.25);
}
.modal-hd {
  padding: 22px 24px 18px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: flex-start; justify-content: space-between;
}
.modal-hd h3 {
  margin: 0;
  font-family: var(--ff-display);
  font-size: 20px;
  font-weight: 500;
}
.modal-hd p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
.modal-bd { padding: 22px 24px; overflow-y: auto; }
.modal-ft { padding: 16px 24px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 8px; background: var(--paper-2); }

.form-row {
  display: grid; gap: 6px; margin-bottom: 16px;
}
.form-row.cols-2 { grid-template-columns: 1fr 1fr; gap: 16px; }
.form-row > .col { display: grid; gap: 6px; }
.form-row label {
  font-size: 11.5px;
  font-family: var(--ff-mono);
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--muted);
}
.form-row input, .form-row select, .form-row textarea {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 14px;
  outline: none;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus {
  border-color: var(--navy-500); background: var(--surface);
}

/* ---------- Early warning rows ---------- */
.warning-row {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--line);
}
.warning-row:last-child { border-bottom: 0; }
.warning-row .ic {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: grid; place-items: center;
}
.warning-row .ic.warn { background: var(--warn-bg); color: var(--warn); }
.warning-row .ic.err  { background: var(--err-bg);  color: var(--err); }
.warning-row .ic.info { background: var(--info-bg); color: var(--info); }
.warning-row h4 { margin: 0 0 2px; font-size: 13.5px; font-weight: 500; }
.warning-row p { margin: 0; color: var(--muted); font-size: 12.5px; }
.warning-row b { color: var(--ink); font-weight: 500; }

/* ---------- Donut SVG ---------- */
.donut { display: block; }
.donut .track { stroke: var(--paper-2); }
.donut .fill { stroke: var(--brand); }
.donut .fill.gold { stroke: var(--gold-500); }

/* ---------- Schedule grid ---------- */
.sched {
  display: grid;
  grid-template-columns: 60px repeat(6, 1fr);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: var(--surface);
  overflow: hidden;
  font-size: 12px;
}
.sched .h {
  padding: 12px 8px;
  text-align: center;
  font-family: var(--ff-mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--muted);
  background: var(--paper-2);
  border-bottom: 1px solid var(--line);
}
.sched .h.day b { display: block; color: var(--ink); font-family: var(--ff-display); font-size: 16px; font-weight: 500; margin-top: 2px; }
.sched .t {
  padding: 10px 8px 8px;
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--muted);
  text-align: right;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.sched .cell {
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 6px;
  min-height: 84px;
  display: flex; flex-direction: column; gap: 4px;
}
.sched .cell:nth-child(7n) { border-right: 0; }
.sched .class {
  background: var(--info-bg);
  color: var(--info);
  border-left: 3px solid var(--info);
  padding: 6px 8px;
  border-radius: 4px;
  font-size: 11.5px;
}
.sched .class b { display: block; color: var(--ink); font-weight: 500; }
.sched .class.gold { background: var(--gold-50); color: var(--gold-700); border-left-color: var(--gold-500); }
.sched .class.ok { background: var(--ok-bg); color: var(--ok); border-left-color: var(--ok); }

/* ---------- Detail two-col ---------- */
.detail {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: var(--space-5);
}
@media (max-width: 1100px) { .detail { grid-template-columns: 1fr; } }
.def-list { display: grid; gap: 10px; }
.def-list .row { display: grid; grid-template-columns: 140px 1fr; gap: 10px; font-size: 13px; }
.def-list .row dt { color: var(--muted); font-size: 12px; }
.def-list .row dd { margin: 0; }

/* ---------- Util ---------- */
.row-flex { display: flex; align-items: center; gap: 8px; }
.row-stack { display: flex; flex-direction: column; gap: 2px; }
.row-stack .sub { color: var(--muted); font-size: 11.5px; }
.mono { font-family: var(--ff-mono); }
.muted { color: var(--muted); }
.hr { height: 1px; background: var(--line); margin: var(--space-5) 0; }
.spacer { flex: 1; }
.gold-text { color: var(--gold-600); }
[data-theme="dark"] .gold-text { color: var(--gold-300); }
.right-align { text-align: right; }

/* Modal — wider variants */
.modal.wide { max-width: 1080px; }
.modal-bd table.tbl th { background: var(--paper); position: sticky; top: 0; }
.bar { height: 6px; background: var(--paper-2); border-radius: 999px; overflow: hidden; }

/* Periode & Kurikulum — prevent horizontal scroll, allow word-wrap */
.setting-card .tbl-wrap { overflow-x: visible; }
.setting-card table.tbl { table-layout: auto; }
.setting-card table.tbl th,
.setting-card table.tbl td {
  white-space: normal;
  word-break: break-word;
  overflow-wrap: break-word;
}
.bar > i { display: block; height: 100%; background: var(--brand); border-radius: 999px; }
.bar > i.gold { background: var(--gold-500); }
.bar > i.ok { background: var(--ok); }
.bar > i.warn { background: var(--warn); }
.bar > i.err { background: var(--err); }

/* ---------- Welcome / hero card (navy gradient) ---------- */
.welcome-card {
  background: linear-gradient(135deg, #102a43 0%, #0B192C 60%, #050b17 100%);
  color: #fff;
  border-radius: var(--radius-xl);
  padding: 32px 36px;
  position: relative;
  overflow: hidden;
  margin-bottom: var(--space-6);
  box-shadow: 0 12px 32px rgba(11,25,44,.16);
}
.welcome-card .eyebrow-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,.1);
  font-size: 11px;
  font-family: var(--ff-sans);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .14em;
  margin-bottom: 18px;
}
.welcome-card h2 {
  font-family: var(--ff-display);
  font-size: 32px;
  font-weight: 700;
  margin: 0 0 10px;
  letter-spacing: -0.025em;
  line-height: 1.15;
}
.welcome-card p {
  margin: 0;
  font-size: 14px;
  color: rgba(255,255,255,.78);
  max-width: 56ch;
}
.welcome-card .deco {
  position: absolute;
  right: 28px;
  top: 50%;
  transform: translateY(-50%);
  width: 96px;
  height: 96px;
  border-radius: 50%;
  background: rgba(255,255,255,.06);
  display: grid; place-items: center;
  color: rgba(255,255,255,.45);
}
@media (max-width: 880px) { .welcome-card .deco { display: none; } }

/* ---------- Settings shell ---------- */
.settings-shell {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 24px;
  align-items: flex-start;
}
@media (max-width: 980px) { .settings-shell { grid-template-columns: 1fr; } }
.settings-nav {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 8px;
  position: sticky;
  top: 24px;
}
.settings-nav-head {
  padding: 12px 14px 8px;
  font-family: var(--ff-mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--muted);
}
.settings-nav-item {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  color: var(--ink-2);
}
.settings-nav-item:hover { background: var(--paper-2); }
.settings-nav-item.active {
  background: var(--navy-700);
  color: #fff;
}
.settings-nav-item.active .m small { color: rgba(255,255,255,.7); }
.settings-nav-item .ic {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: var(--paper-2);
  color: var(--navy-700);
  display: grid; place-items: center;
}
.settings-nav-item.active .ic { background: var(--gold-500); color: var(--navy-900); }
.settings-nav-item .m b { display: block; font-size: 13.5px; font-weight: 500; line-height: 1.2; }
.settings-nav-item .m small { display: block; color: var(--muted); font-size: 11.5px; margin-top: 2px; line-height: 1.3; }

.settings-panel {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.panel-head {
  display: grid;
  grid-template-columns: 56px 1fr;
  gap: 16px;
  align-items: flex-start;
  padding: 4px 4px 8px;
}
.panel-head .ic {
  width: 56px; height: 56px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--gold-500), var(--gold-300));
  color: var(--navy-900);
  display: grid; place-items: center;
}
.panel-head h2 {
  font-family: var(--ff-display);
  font-size: 24px;
  font-weight: 500;
  margin: 0 0 6px;
  letter-spacing: -0.01em;
}
.panel-head p { margin: 0; color: var(--muted); font-size: 13.5px; max-width: 64ch; }

.setting-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.setting-card-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
  font-family: var(--ff-display);
  font-size: 14px;
  font-weight: 500;
}
.setting-card .field-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px 24px;
  padding: 20px;
}
@media (max-width: 720px) { .setting-card .field-grid { grid-template-columns: 1fr; } }
.setting-card table.tbl th,
.setting-card table.tbl td { border-bottom: 1px solid var(--line); }

.field { display: flex; flex-direction: column; gap: 6px; }
.field > label {
  font-size: 11.5px;
  font-family: var(--ff-mono);
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--muted);
}
.field > small {
  font-size: 11.5px;
  color: var(--muted-2);
  line-height: 1.4;
}
.field input[type="text"],
.field input[type="number"],
.field select {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
  width: 100%;
}
.field input:focus, .field select:focus { border-color: var(--navy-500); background: var(--surface); }
.field input[disabled] { background: var(--paper-2); color: var(--muted); cursor: not-allowed; }

/* Toggle pill */
.toggle {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px 6px 6px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--paper);
  cursor: pointer;
  font-size: 12.5px;
  font-family: inherit;
  color: var(--muted);
  width: fit-content;
}
.toggle .dot {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--line);
  transition: all .15s ease;
}
.toggle.on {
  background: var(--ok-bg);
  border-color: var(--ok);
  color: var(--ok);
}
.toggle.on .dot {
  background: var(--ok);
  border-color: var(--ok);
  transform: translateX(2px);
}

/* Slider rows for komposisi */
.slider-row {
  display: flex; align-items: center; gap: 12px;
}
.slider-row input[type="range"] {
  flex: 1;
  appearance: none;
  -webkit-appearance: none;
  height: 6px;
  background: var(--paper-2);
  border-radius: 999px;
}
.slider-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--gold-500);
  border: 2px solid var(--surface);
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
  cursor: pointer;
}
.slider-row input[type="range"]::-moz-range-thumb {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--gold-500);
  border: 2px solid var(--surface);
  cursor: pointer;
}
.slider-row .mono { min-width: 44px; text-align: right; font-size: 13px; font-weight: 500; }

/* Stack bar (komposisi) */
.stack-bar {
  display: flex;
  height: 36px;
  border-radius: 8px;
  overflow: hidden;
  margin: 20px 20px 4px;
}
.stack-bar > div {
  transition: width .2s ease;
  position: relative;
}

/* NIM preview */
.nim-preview {
  padding: 24px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
  align-items: center;
}
@media (max-width: 720px) { .nim-preview { grid-template-columns: 1fr; } }
.nim-display {
  font-size: 44px;
  font-family: var(--ff-mono);
  font-weight: 500;
  letter-spacing: 0.05em;
  color: var(--navy-700);
  padding: 18px 22px;
  background: var(--paper);
  border: 1px dashed var(--line-2);
  border-radius: 12px;
  text-align: center;
}
.nim-legend { display: grid; gap: 10px; }
.nim-legend-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.nim-legend-row .lbl {
  font-family: var(--ff-mono);
  color: #fff;
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 12px;
  min-width: 50px;
  text-align: center;
}

/* Bobot input stepper */
.bobot-input {
  display: inline-flex;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--paper);
  overflow: hidden;
}
.bobot-input button {
  width: 28px; height: 32px;
  background: transparent;
  border: 0;
  cursor: pointer;
  color: var(--muted);
  font-size: 14px;
}
.bobot-input button:hover { background: var(--paper-2); color: var(--ink); }
.bobot-input input {
  width: 60px;
  border: 0;
  background: transparent;
  text-align: center;
  outline: none;
  font-family: var(--ff-mono);
  font-size: 13px;
  font-weight: 500;
  padding: 6px 0;
}

/* tiny chart bars */
.spark { display: flex; align-items: flex-end; gap: 3px; height: 36px; }
.spark i {
  display: block;
  width: 8px;
  background: linear-gradient(180deg, var(--navy-500), var(--navy-700));
  border-radius: 2px;
}
.spark i.dim { background: var(--paper-2); }

/* Responsive */
@media (max-width: 1200px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .cycle-strip { grid-template-columns: repeat(3, 1fr); }
  .cycle-step:nth-child(3) { border-right: 0; }
}
@media (max-width: 720px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .cycle-strip { grid-template-columns: 1fr; }
  .cycle-step { border-right: 0; border-bottom: 1px solid var(--line); }
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  </script>

const fmtIDR = (n) => "Rp " + Math.round(n).toLocaleString("id-ID");

};

const Donut = ({ size = 120, stroke = 14, value, max = 100, color = "gold" }) => {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const dash = (value / max) * c;
  return (
    <svg width={size} height={size} className="donut" viewBox={`0 0 ${size} ${size}`}>
      <circle className="track" cx={size/2} cy={size/2} r={r} strokeWidth={stroke} fill="none"/>
      <circle className={`fill ${color === "gold" ? "gold" : ""}`} cx={size/2} cy={size/2} r={r}
              strokeWidth={stroke} fill="none" strokeLinecap="round"
              strokeDasharray={`${dash} ${c}`}
              transform={`rotate(-90 ${size/2} ${size/2})`}/>

  );

);

const Th = ({ id, label, sort, onSort, align = "left", style }) => {
  const active = sort.key === id;
  return (
    <th
      onClick={() => onSort(id)}
      className={active ? "sorted" : ""}
      style={{ textAlign: align, ...style }}
    >
      {label}
      <span className="sort">{active ? (sort.dir === "asc" ? "↑" : "↓") : "↕"}</span>
    </th>
  );
};

function useSort(initial = { key: null, dir: "asc" }) {
  const [sort, setSort] = useState(initial);
  const onSort = (k) =>
    setSort((s) => (s.key === k ? { key: k, dir: s.dir === "asc" ? "desc" : "asc" } : { key: k, dir: "asc" }));
  return [sort, onSort];
}

function sortBy(arr, sort) {
  if (!sort.key) return arr;
  const copy = [...arr];
  copy.sort((a, b) => {
    const av = a[sort.key], bv = b[sort.key];
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === "number") return sort.dir === "asc" ? av - bv : bv - av;
    return sort.dir === "asc" ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
  });
  return copy;
}

        {action && <div className="row-flex">{action}</div>}
      </header>

  Pill, Donut, Spark, Th, useSort, sortBy,
  Modal, PageHd, Card,
});

  <script type="text/babel">
// siakad/screen-matakuliah.jsx — HERO screen: Mata Kuliah / Bank MK
const { courses, programs } = window.SIAKAD_DATA;

function ScreenMataKuliah() {
  const [tab, setTab]         = useState("semua");
  const [q, setQ]             = useState("");
  const [prodi, setProdi]     = useState("Semua");
  const [sks, setSks]         = useState("Semua");
  const [sort, onSort]        = useSort({ key: "code", dir: "asc" });
  const [selected, setSelected] = useState(courses[2]); // AI as default
  const [showAdd, setShowAdd]   = useState(false);

  const filtered = useMemo(() => {
    let r = courses;
    if (tab === "mku")      r = r.filter(c => c.type === "MKU");
    if (tab === "wajib")    r = r.filter(c => c.type === "Wajib Prodi");
    if (tab === "pilihan")  r = r.filter(c => c.type === "Pilihan");
    if (prodi !== "Semua")  r = r.filter(c => c.prodi === prodi);
    if (sks !== "Semua")    r = r.filter(c => c.sks === Number(sks));
    if (q) {
      const t = q.toLowerCase();
      r = r.filter(c => c.code.toLowerCase().includes(t) || c.name.toLowerCase().includes(t) || c.dosen.toLowerCase().includes(t));
    }
    return sortBy(r, sort);
  }, [tab, prodi, sks, q, sort]);

  const counts = {
    semua:   courses.length,
    mku:     courses.filter(c => c.type === "MKU").length,
    wajib:   courses.filter(c => c.type === "Wajib Prodi").length,
    pilihan: courses.filter(c => c.type === "Pilihan").length,
  };

  return (
    <>
      <PageHd
        eyebrow={PAGE_TITLES.matakuliah.eyebrow}
        title={PAGE_TITLES.matakuliah.title}
        lede={PAGE_TITLES.matakuliah.lede}
      >
        <button className="btn"><Icon name="upload" size={14}/>Import CSV</button>
        <button className="btn"><Icon name="download" size={14}/>Ekspor</button>
        <button className="btn primary" onClick={() => setShowAdd(true)}>
          <Icon name="plus" size={14}/>Mata Kuliah Baru
        </button>
      </PageHd>

      {/* Summary strip */}
      <div className="kpi-grid" style={{ gridTemplateColumns: "repeat(4, 1fr)", marginBottom: 24 }}>
        <KpiSmall label="Total MK aktif"     value={courses.length}   delta="↑ 8 vs semester lalu" accent="navy"/>
        <KpiSmall label="Total kelas dibuka" value={courses.reduce((s,c)=>s+c.kelas,0)} delta="142 jadwal sinkron" accent="gold"/>
        <KpiSmall label="Rata-rata isi kuota" value="86%" delta="↑ 4 pp"  accent="ok"/>
        <KpiSmall label="Belum ada pengampu"  value="2"   delta="Perlu plotting" accent="warn"/>
      </div>

      {/* Tabs */}
      <div className="tabs">
        {[
          ["semua",   "Semua MK"],
          ["mku",     "MK Umum (MKU)"],
          ["wajib",   "Wajib Prodi"],
          ["pilihan", "Pilihan"],
        ].map(([id, label]) => (
          <div key={id} className={cls("tab", tab === id && "active")} onClick={() => setTab(id)}>
            {label}<span className="count">{counts[id]}</span>
          </div>
        ))}
      </div>

      <div className="detail">
        {/* Left: table */}
        <Card tight>
          <div className="filter-bar">
            <input className="input search" placeholder="Cari kode, nama MK, dosen…" value={q} onChange={e => setQ(e.target.value)}/>
            <select className="select" value={prodi} onChange={e => setProdi(e.target.value)}>
              <option>Semua</option>
              {programs.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
              <option value="MKU">Mata Kuliah Umum</option>
            </select>
            <select className="select" value={sks} onChange={e => setSks(e.target.value)}>
              <option>Semua</option>
              <option>2</option><option>3</option><option>4</option>
            </select>
            <div className="spacer"/>
            <span className="muted" style={{fontSize:12}}>{filtered.length} mata kuliah</span>
          </div>
          <div className="tbl-wrap">
            <table className="tbl">
              <thead>
                <tr>
                  <Th id="code"      label="Kode"      sort={sort} onSort={onSort}/>
                  <Th id="name"      label="Mata Kuliah" sort={sort} onSort={onSort}/>
                  <Th id="sks"       label="SKS" sort={sort} onSort={onSort} align="right"/>
                  <Th id="semester"  label="Sem"  sort={sort} onSort={onSort} align="right"/>
                  <Th id="dosen"     label="Pengampu" sort={sort} onSort={onSort}/>
                  <Th id="terdaftar" label="Isi kelas" sort={sort} onSort={onSort} align="right"/>
                  <Th id="mode"      label="Mode" sort={sort} onSort={onSort}/>
                </tr>
              </thead>
              <tbody>
                {filtered.map(c => {
                  const pct = Math.round((c.terdaftar / c.kuota) * 100);
                  const over = c.terdaftar > c.kuota;
                  return (
                    <tr key={c.code} className={selected?.code === c.code ? "selected" : ""} onClick={() => setSelected(c)}>
                      <td className="mono">{c.code}</td>
                      <td>
                        <div className="row-stack">
                          <span>{c.name}</span>
                          <span className="sub">{c.type} · {programs.find(p => p.id === c.prodi)?.name || "MKU"}</span>
                        </div>
                      </td>
                      <td className="num right-align">{c.sks}</td>
                      <td className="num right-align">{c.semester}</td>
                      <td>{c.dosen}</td>
                      <td className="num right-align" style={{minWidth:140}}>
                        <div style={{display:"flex", alignItems:"center", gap:8, justifyContent:"flex-end"}}>
                          <span style={{minWidth:60}}>{c.terdaftar}/{c.kuota}</span>
                          <div className="bar" style={{width:60}}>
                            <i className={over ? "err" : pct > 85 ? "warn" : "gold"} style={{width: Math.min(100, pct) + "%"}}/>
                          </div>
                        </div>
                      </td>
                      <td><Pill tone={c.mode === "Sync" ? "info" : c.mode === "Async" ? "ok" : "warn"}>{c.mode}</Pill></td>
                    </tr>
                  );

function ScreenMahasiswa() {
  const { students, programs } = window.SIAKAD_DATA;
  const [q, setQ] = useState("");

  const counts = {
    aktif:  students.filter(s => s.status === "Aktif").length,

  return (
    <>

        </div>
        <div className="tbl-wrap">
          <table className="tbl">
            <thead>
              <tr>
                <Th id="nim"    label="NIM"          sort={sort} onSort={onSort}/>
                <Th id="name"   label="Nama"         sort={sort} onSort={onSort}/>
                <Th id="prodi"  label="Program studi" sort={sort} onSort={onSort}/>

                <Th id="sem"    label="Sem" sort={sort} onSort={onSort} align="right"/>

              </tr>
            </thead>
            <tbody>
              {filtered.map(s => {
                const ipkLow = s.ipk < 2.5;
                return (
                  <tr key={s.nim}>
                    <td className="mono">{s.nim}</td>
                    <td>
                      <div className="row-flex" style={{gap: 10}}>

                        </div>
                      </div>
                    </td>
                    <td>{window.SIAKAD_DATA.programs.find(p => p.id === s.prodi)?.name}</td>
                    <td className="num right-align">{s.angkatan}</td>
                    <td className="num right-align">{s.sem}</td>
                    <td className="num right-align">{s.sks}</td>
                    <td className="num right-align" style={{color: ipkLow ? "var(--err)" : "inherit", fontWeight: 500}}>
                      {s.ipk.toFixed(2)}
                    </td>
                    <td><Pill tone={s.status === "Aktif" ? "ok" : s.status === "Cuti" ? "warn" : "info"}>{s.status}</Pill></td>
                    <td className="muted" style={{fontSize:12}}>{s.pa}</td>

                          <Icon name="edit" size={12}/>Edit
                        </button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Card>

      {showAdd && <AddStudentModal onClose={() => setShowAdd(false)}/>}
      {selected && <StudentDetailModal s={selected} onClose={() => setSelected(null)}/>}
      {editing && <EditStudentModal s={editing} onClose={() => setEditing(null)}/>}
    </>
  );
}

                <Th id="status" label="Status" sort={sort} onSort={onSort}/>

              {filtered.map(g => {

                const tone = g.status === "Final" ? "ok" : g.status === "Terkunci" ? "gold" : g.status === "Sebagian" ? "warn" : "err";
                return (
                  <tr key={g.code}>
                    <td className="mono">{g.code}</td>
                    <td>{g.name}</td>
                    <td className="muted" style={{fontSize:12.5}}>{g.dosen}</td>

                        <div className="bar" style={{width:90}}><i className={pct === 100 ? "ok" : pct > 0 ? "warn" : "err"} style={{width: pct + "%"}}/></div>
                      </div>
                    </td>
                    <td><Pill tone={tone}>{g.status}</Pill></td>
                    <td className="right-align">
                      {g.status === "Belum" && <button className="btn sm" onClick={() => remind(g)}><Icon name="bell" size={12}/>Ingatkan</button>}
                      {g.status === "Sebagian" && <button className="btn sm" onClick={() => setViewing(g)}>Lanjut input</button>}
                      {(g.status === "Final" || g.status === "Terkunci") && <button className="btn sm ghost" onClick={() => setViewing(g)}><Icon name="external" size={12}/>Lihat</button>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Card>

      {toast && (
        <div style={{
          position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
          background: "var(--ok)", color: "#fff",
          padding: "12px 22px", borderRadius: 12,
          boxShadow: "0 12px 32px rgba(5,150,105,.3)",
          zIndex: 200, maxWidth: 540,
          fontSize: 13.5, fontWeight: 500,
        }}>{toast}</div>
      )}

      {viewing && <NilaiKelasModal g={viewing} onClose={() => setViewing(null)}/>}
    </>
  );
}

function NilaiKelasModal({ g, onClose }) {
  const students = window.SIAKAD_DATA.students.slice(0, Math.min(g.total, 12));
  const masuk = students.slice(0, Math.min(g.masuk, students.length));
  return (
    <Modal
      title={`${g.name} — Nilai Kelas`}
      subtitle={`${g.code} · ${g.dosen} · Kelas ${g.kelas} · ${g.masuk}/${g.total} mahasiswa diinput`}
      onClose={onClose}
      width={920}
      footer={
        <>
          <span className="muted" style={{fontSize: 12, marginRight: "auto"}}>
            {g.status === "Final" || g.status === "Terkunci" ? "Read-only — nilai sudah dikunci" : "Klik nilai untuk edit"}
          </span>
          <button className="btn ghost" onClick={onClose}>Tutup</button>
          <button className="btn"><Icon name="download" size={14}/>Ekspor</button>
          {g.status !== "Terkunci" && <button className="btn primary"><Icon name="check" size={14}/>Finalisasi</button>}
        </>
      }
    >
      <div className="tbl-wrap" style={{maxHeight: "55vh", overflow: "auto", border: "1px solid var(--line)", borderRadius: 12}}>
        <table className="tbl" style={{fontSize: 13}}>
          <thead style={{position: "sticky", top: 0, background: "var(--paper)"}}>
            <tr>
              <th>NIM</th>
              <th>Mahasiswa</th>
              <th style={{textAlign:"right"}}>Tugas</th>
              <th style={{textAlign:"right"}}>Kuis</th>
              <th style={{textAlign:"right"}}>UTS</th>
              <th style={{textAlign:"right"}}>UAS</th>
              <th style={{textAlign:"right"}}>Hadir</th>
              <th style={{textAlign:"right"}}>Nilai Akhir</th>
              <th>Huruf</th>
            </tr>
          </thead>
          <tbody>
            {students.map((s, i) => {
              const isMasuk = i < masuk.length;
              const seed = (s.nim.charCodeAt(8) + i * 13) % 100;
              const tg = 65 + (seed % 36), kz = 60 + ((seed*3)%41), uts = 55 + ((seed*7)%46), uas = 60 + ((seed*11)%41), hd = 70 + ((seed*5)%31);
              const final = tg*0.2 + kz*0.1 + uts*0.25 + uas*0.35 + hd*0.1;
              let huruf = "T";
              if (isMasuk) {
                if (final >= 85) huruf = "A";
                else if (final >= 80) huruf = "A-";
                else if (final >= 75) huruf = "B+";
                else if (final >= 70) huruf = "B";
                else if (final >= 65) huruf = "B-";
                else if (final >= 60) huruf = "C+";
                else if (final >= 55) huruf = "C";
                else if (final >= 45) huruf = "D";
                else huruf = "E";
              }
              return (
                <tr key={s.nim}>
                  <td className="mono" style={{fontSize:11.5}}>{s.nim}</td>
                  <td>{s.name}</td>
                  <td className="num right-align" style={{color: isMasuk ? "inherit" : "var(--muted)"}}>{isMasuk ? tg : "—"}</td>
                  <td className="num right-align" style={{color: isMasuk ? "inherit" : "var(--muted)"}}>{isMasuk ? kz : "—"}</td>
                  <td className="num right-align" style={{color: isMasuk ? "inherit" : "var(--muted)"}}>{isMasuk ? uts : "—"}</td>
                  <td className="num right-align" style={{color: isMasuk ? "inherit" : "var(--muted)"}}>{isMasuk ? uas : "—"}</td>
                  <td className="num right-align" style={{color: isMasuk ? "inherit" : "var(--muted)"}}>{isMasuk ? hd : "—"}</td>
                  <td className="num right-align" style={{fontWeight: 700, color: !isMasuk ? "var(--muted)" : final >= 55 ? "var(--ok)" : "var(--err)"}}>{isMasuk ? final.toFixed(1) : "—"}</td>
                  <td>
                    <span style={{
                      display: "inline-grid", placeItems: "center",
                      width: 32, padding: "3px 0", borderRadius: 6,
                      background: huruf === "T" ? "var(--paper-2)" : ["A","A-"].includes(huruf) ? "var(--ok)" : ["B+","B","B-"].includes(huruf) ? "var(--gold-600)" : ["C+","C"].includes(huruf) ? "var(--warn)" : "var(--err)",
                      color: huruf === "T" ? "var(--muted)" : "#fff",
                      fontWeight: 700, fontSize: 12,
                    }}>{huruf}</span>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </Modal>
  );
}

      ["2023110015", "Bagas Pratama"],

      ["2024110002", "Harun Aditya Nugroho"],

      ["2022110056", "Putra Wibawa"],
      ["2024110055", "Ratna Sari Wahyuni"],
      ["2023110089", "Tegar Maulana"],
    ];
    // Seeded "randomish" but deterministic
    return names.map(([nim, name], i) => {
      const seed = (i * 17 + 11) % 100;
      const buka     = Math.min(100, 80 + (seed % 21));
      const baca     = Math.min(100, 65 + ((seed * 3) % 36));
      const nonton   = Math.min(100, 40 + ((seed * 7) % 60));    // proporsional
      const download = Math.min(100, 50 + ((seed * 13) % 50));
      const komentar = Math.min(100, 30 + ((seed * 11) % 70));
      // Bobot komponen
      const w = { buka: 15, baca: 20, nonton: 35, download: 10, komentar: 20 };
      // Untuk nonton: ratio × bobot. Untuk lain: kalau ≥ threshold (anggap 50%), dapat penuh.
      const score = (buka >= 50 ? w.buka : 0)
                  + (baca >= 50 ? w.baca : 0)
                  + (nonton / 100) * w.nonton
                  + (download >= 50 ? w.download : 0)
                  + (komentar >= 50 ? w.komentar : 0);
      return { nim, name, buka, baca, nonton, download, komentar, score };
    });
  }, [mk.code]);

  return (
    <Modal
      title={`Detail kehadiran — ${mk.name}`}

        <table className="tbl" style={{fontSize: 13}}>
          <thead style={{position:"sticky", top:0, zIndex:1}}>
            <tr>
              <th>NIM</th>
              <th>Nama</th>
              <th style={{textAlign:"right"}}>Buka Sesi<br/><small style={{fontWeight:400, color:"var(--muted-2)"}}>15%</small></th>
              <th style={{textAlign:"right"}}>Baca<br/><small style={{fontWeight:400, color:"var(--muted-2)"}}>20%</small></th>
              <th style={{textAlign:"right"}}>Nonton<br/><small style={{fontWeight:400, color:"var(--muted-2)"}}>35% · prop.</small></th>
              <th style={{textAlign:"right"}}>Download<br/><small style={{fontWeight:400, color:"var(--muted-2)"}}>10%</small></th>
              <th style={{textAlign:"right"}}>Komentar<br/><small style={{fontWeight:400, color:"var(--muted-2)"}}>20%</small></th>
              <th style={{textAlign:"right"}}>Total</th>

          <tbody>
            {students.map(s => {
              const tone = (v) => v >= 75 ? "var(--ok)" : v >= 50 ? "var(--warn)" : "var(--err)";
              const toneScore = s.score >= 75 ? "var(--ok)" : s.score >= 60 ? "var(--warn)" : "var(--err)";
              return (
