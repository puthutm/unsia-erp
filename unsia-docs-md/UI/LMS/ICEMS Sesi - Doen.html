<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Universitas Siber Asia - Teacher Sessions Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

        body, .font-sans {
            font-family: 'Poppins', sans-serif !important;
            letter-spacing: -0.01em;
        }

        /* Scrollbar kustom */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Animasi Masuk Kartu */
        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .session-card {
            animation: fadeInSlide 0.6s cubic-bezier(0.23, 1, 0.32, 1) backwards;
        }

        /* Hover Effect Sesi Aktif */
        .active-card {
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            border-left-width: 0px; /* Start state */
        }
        
        .active-card:hover {
            border-color: #93c5fd; 
            box-shadow: 0 20px 40px -10px rgba(59, 130, 246, 0.08); 
            transform: translateX(6px) translateY(-2px);
        }

        .active-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background-color: #2563eb;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .active-card:hover::before {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 min-h-screen font-sans selection:bg-blue-100 selection:text-blue-900">

    <!-- HEADER NAV -->
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 lg:px-12 sticky top-0 z-50 shadow-sm backdrop-blur-md bg-white/90">
        <div class="flex items-center gap-2 text-xs font-medium text-slate-400">
            <div class="w-8 h-8 bg-[#004996] rounded-lg flex items-center justify-center text-white font-bold text-xs mr-2 shadow-inner">U</div>
            <span class="hover:text-blue-600 transition-colors cursor-pointer">Courses Offered</span>
            <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-slate-300"></i>
            <span class="text-slate-900 font-bold tracking-tight">SI-001</span>
        </div>
        <div class="flex items-center gap-4">
            <button class="text-slate-400 hover:text-blue-600 transition-colors relative p-2 hover:bg-slate-50 rounded-full">
                <i data-lucide="bell" class="w-5 h-5"></i>
                <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-red-500 border border-white rounded-full"></span>
            </button>
            <div class="text-right ml-1 hidden sm:block">
                <p class="text-xs font-bold text-slate-800 leading-none">Noviandri S.Kom</p>
                <p class="text-[9px] text-blue-600 uppercase tracking-widest font-black mt-1">Dosen Utama</p>
            </div>
            <div class="w-9 h-9 rounded-full bg-slate-200 border-2 border-white shadow-md overflow-hidden ring-1 ring-slate-100 shrink-0">
                <img src="https://ui-avatars.com/api/?name=Noviandri+S&background=1e293b&color=fff" alt="Teacher" />
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT AREA -->
    <main class="p-6 lg:p-10 flex flex-col items-center">
        
        <!-- Wadah Konten (max-w-5xl) -->
        <div class="w-full max-w-5xl space-y-8">
            
            <!-- COURSE INFO HERO CARD -->
            <div class="bg-white border border-slate-200 rounded-[2rem] p-6 md:p-10 flex flex-col md:flex-row justify-between items-start md:items-center shadow-sm relative overflow-hidden group hover:border-blue-300 transition-all duration-500">
                <div class="absolute right-0 top-0 w-80 h-80 bg-gradient-to-br from-blue-100/40 to-teal-50/40 rounded-full blur-3xl opacity-60 -translate-y-1/2 translate-x-1/4 group-hover:scale-110 transition-transform duration-700"></div>

                <div class="space-y-5 relative z-10 w-full md:w-auto">
                    <div class="flex items-center gap-4">
                        <h1 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">Sistem Operasi</h1>
                        <button onclick="showToast('Membuka pengaturan mata kuliah')" class="p-2 text-slate-400 hover:bg-slate-100 hover:text-slate-800 rounded-xl transition-all opacity-0 group-hover:opacity-100">
                            <i data-lucide="settings" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <div class="flex flex-wrap items-center gap-3 text-[10px] font-bold uppercase tracking-widest text-slate-500">
                        <span class="bg-[#00A99D] text-white px-4 py-1.5 rounded-lg shadow-sm">SI-001</span>
                        <span class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg flex items-center gap-1.5"><i data-lucide="book" class="w-3.5 h-3.5"></i> 3 sks</span>
                        <span class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg flex items-center gap-1.5"><i data-lucide="calendar" class="w-3.5 h-3.5"></i> Genap Tahun ajaran 2026</span>
                        <span class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg flex items-center gap-1.5"><i data-lucide="clock" class="w-3.5 h-3.5"></i> Friday, 04:00 - 05:00</span>
                    </div>
                    
                    <div class="flex items-center gap-4 mt-6 pt-6 border-t border-slate-100">
                        <div class="relative shrink-0">
                            <img src="https://ui-avatars.com/api/?name=Noviandri+S&background=1e293b&color=fff" class="w-12 h-12 rounded-2xl shadow-md border-2 border-white" alt="Dosen"/>
                            <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 border-2 border-white rounded-full"></div>
                        </div>
                        <div>
                            <p class="text-[14px] font-black text-slate-800 tracking-tight">Noviandri S.Kom., MMSI S.Kom., MMSI</p>
                            <p class="text-[10px] text-slate-400 font-bold tracking-widest mt-0.5">NIDN : 2110102006</p>
                        </div>
                    </div>
                </div>
                
                <!-- PROGRESS CIRCLE -->
                <div class="mt-8 md:mt-0 flex shrink-0 relative z-10 mx-auto md:mx-0 group/progress">
                    <div class="relative w-32 h-32 flex items-center justify-center">
                        <svg class="w-full h-full transform -rotate-90 absolute top-0 left-0" viewBox="0 0 36 36">
                            <path stroke-dasharray="100, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#f1f5f9" stroke-width="3" />
                            <path stroke-dasharray="4, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#facc15" stroke-width="3.5" class="animate-pulse" stroke-linecap="round" />
                        </svg>
                        <div class="flex flex-col items-center justify-center bg-white rounded-full w-24 h-24 shadow-sm border border-slate-50 z-10 group-hover/progress:scale-105 transition-transform duration-500">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Progress</span>
                            <span class="text-2xl font-black text-slate-800 -mt-1">4%</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- LEARNING SESSIONS LIST -->
            <div class="bg-white border border-slate-200 rounded-[2.5rem] overflow-hidden shadow-sm">
                <div class="bg-slate-50/50 border-b border-slate-200 px-8 py-5 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-1.5 h-5 bg-[#004996] rounded-full shadow-sm"></div>
                        <h3 class="text-[13px] font-black text-slate-700 uppercase tracking-widest">Learning Sessions</h3>
                    </div>
                    <button onclick="showToast('Membuka form penambahan sesi')" class="flex items-center gap-2 bg-[#004996] text-white px-5 py-2.5 rounded-xl text-[10px] font-black tracking-widest uppercase transition-all shadow-lg shadow-blue-900/20 hover:bg-blue-800 active:scale-95">
                        <i data-lucide="plus" class="w-3.5 h-3.5"></i> Tambah Sesi
                    </button>
                </div>
                
                <div id="sessions-container" class="p-5 md:p-8 space-y-5 bg-[#FAFBFC]">
                    <!-- Sessions will be injected here by JS -->
                </div>
            </div>
            
            <div class="h-10"></div>
        </div>
    </main>

    <!-- TOAST POPUP -->
    <div id="toast" class="fixed bottom-10 right-10 z-[100] transform translate-y-10 opacity-0 pointer-events-none transition-all duration-500">
        <div class="bg-slate-900 text-white px-7 py-4 rounded-2xl shadow-2xl flex items-center gap-4 border border-white/10 backdrop-blur-md">
            <div class="w-8 h-8 bg-blue-500 rounded-xl flex items-center justify-center text-white font-bold">
                <i data-lucide="check-circle" class="w-4.5 h-4.5"></i>
            </div>
            <p id="toast-text" class="text-sm font-semibold tracking-wide">Memproses...</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        const sessionsData = [
            { id: 1, title: 'Manajemen Sistem Informasi', status: 'Class Not Started', date: 'Monday, 20 October 2026 06:00-08:30', resources: 2, assignments: 3, quiz: 4, record: 0, isActive: true },
            { id: 2, title: 'Evolusi Teknologi Informasi dan Komunikasi', status: 'Class Not Started', date: 'Monday, 27 October 2026 06:00-08:30', resources: 1, assignments: 0, quiz: 0, record: 0, isActive: true },
            { id: 3, title: '', status: 'Class Not Started', date: 'Monday, 3 November 2026 06:00-08:30', resources: 0, assignments: 0, quiz: 0, record: 0, isActive: false },
            { id: 4, title: '', status: 'Class Not Started', date: 'Monday, 10 November 2026 06:00-08:30', resources: 0, assignments: 0, quiz: 0, record: 0, isActive: false },
            { id: 5, title: '', status: 'Class Not Started', date: 'Monday, 17 November 2026 06:00-08:30', resources: 0, assignments: 0, quiz: 0, record: 0, isActive: false },
            { id: 6, title: '', status: 'Class Not Started', date: 'Monday, 24 November 2026 06:00-08:30', resources: 0, assignments: 0, quiz: 0, record: 0, isActive: false },
            { id: 7, title: '', status: 'Class Not Started', date: 'Monday, 1 December 2026 06:00-08:30', resources: 0, assignments: 0, quiz: 0, record: 0, isActive: false },
            { id: 8, title: '', status: 'Class Not Started', date: 'Wednesday, 2 December 2026 06:00-08:30', resources: 0, assignments: 0, quiz: 0, record: 0, isActive: false },
            { id: 9, title: '', status: 'Class Not Started', date: 'Monday, 14 December 2026 06:00-08:30', resources: 0, assignments: 0, quiz: 0, record: 0, isActive: false },
            { id: 10, title: '', status: 'Class Not Started', date: 'Monday, 21 December 2026 06:00-08:30', resources: 0, assignments: 0, quiz: 0, record: 0, isActive: false },
            { id: 11, title: '', status: 'Class Not Started', date: 'Monday, 28 December 2026 06:00-08:30', resources: 0, assignments: 0, quiz: 0, record: 0, isActive: false },
            { id: 12, title: '', status: 'Class Not Started', date: 'Monday, 4 January 2027 06:00-08:30', resources: 0, assignments: 0, quiz: 0, record: 0, isActive: false },
            { id: 13, title: '', status: 'Class Not Started', date: 'Monday, 11 January 2027 06:00-08:30', resources: 0, assignments: 0, quiz: 0, record: 0, isActive: false },
            { id: 14, title: '', status: 'Class Not Started', date: 'Monday, 18 January 2027 06:00-08:30', resources: 0, assignments: 0, quiz: 0, record: 0, isActive: false },
            { id: 15, title: '', status: 'Class Not Started', date: 'Monday, 25 January 2027 06:00-08:30', resources: 0, assignments: 0, quiz: 0, record: 0, isActive: false },
            { id: 16, title: '', status: 'Class Not Started', date: 'Wednesday, 27 January 2027 06:00-08:30', resources: 0, assignments: 0, quiz: 0, record: 0, isActive: false }
        ];

        function renderSessions() {
            const container = document.getElementById('sessions-container');
            container.innerHTML = sessionsData.map((session, index) => {
                const isActive = session.isActive;
                const title = session.title || 'Topik Sesi Belum Ditentukan';
                const opacityClass = isActive ? 'bg-white border-slate-200 active-card' : 'bg-slate-100/40 border-slate-200 grayscale opacity-50 cursor-not-allowed';
                const delay = index * 0.03;

                return `
                    <div class="session-card group relative flex flex-col md:flex-row md:items-stretch justify-between gap-6 p-6 md:p-7 rounded-[1.5rem] border ${opacityClass}" style="animation-delay: ${delay}s">
                        
                        <div class="flex items-start gap-6 flex-grow w-full z-10">
                            <!-- Icon -->
                            <div class="w-14 h-14 rounded-2xl border flex items-center justify-center shrink-0 transition-all duration-500 shadow-sm ${isActive ? 'bg-blue-50 border-blue-100 text-blue-600 group-hover:bg-blue-600 group-hover:text-white group-hover:rotate-6' : 'bg-slate-200 border-slate-300 text-slate-400'}">
                                ${isActive ? '<i data-lucide="layers" class="w-7 h-7"></i>' : '<i data-lucide="lock" class="w-6 h-6"></i>'}
                            </div>

                            <!-- Content -->
                            <div class="space-y-3.5 flex-grow min-w-0">
                                <div class="flex flex-wrap items-center gap-3">
                                    <h4 class="text-[16px] font-black truncate tracking-tight transition-colors ${isActive ? 'text-slate-800 group-hover:text-blue-700' : 'text-slate-500 ' + (session.title ? '' : 'italic')}">
                                        ${title}
                                    </h4>
                                    <span class="text-[9px] font-black border px-2.5 py-1 rounded-full uppercase tracking-tighter shadow-sm whitespace-nowrap ${isActive ? 'bg-blue-50 text-blue-700 border-blue-100' : 'bg-slate-200 text-slate-500 border-slate-300'}">
                                        ${session.status}
                                    </span>
                                </div>
                                
                                <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[10px] font-black tracking-widest uppercase transition-all duration-300 ${isActive ? 'bg-slate-50 text-slate-500 group-hover:bg-blue-50 group-hover:text-blue-700' : 'bg-slate-200 text-slate-400'}">
                                    <i data-lucide="layout" class="w-3.5 h-3.5 opacity-70"></i> 
                                    Session ${session.id}
                                </span>

                                <!-- Metrics -->
                                <div class="flex flex-wrap items-center gap-6 text-[10px] font-bold pt-1 transition-colors duration-300 ${isActive ? 'text-slate-500' : 'text-slate-400'}">
                                    <div class="flex items-center gap-1.5 transition-all ${session.resources > 0 ? 'text-blue-600' : 'opacity-40'}"><i data-lucide="file-text" class="w-4 h-4"></i> ${session.resources} Resources</div>
                                    <div class="flex items-center gap-1.5 transition-all ${session.assignments > 0 ? 'text-blue-600' : 'opacity-40'}"><i data-lucide="book-open" class="w-4 h-4"></i> ${session.assignments} Assignments</div>
                                    <div class="flex items-center gap-1.5 transition-all ${session.quiz > 0 ? 'text-blue-600' : 'opacity-40'}"><i data-lucide="help-circle" class="w-4 h-4"></i> ${session.quiz} Quiz</div>
                                    <div class="flex items-center gap-1.5 transition-all ${session.record > 0 ? 'text-blue-600' : 'opacity-40'}"><i data-lucide="play-circle" class="w-4 h-4"></i> ${session.record} Record</div>
                                </div>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="flex flex-col items-start md:items-end justify-between mt-4 md:mt-0 shrink-0 z-10 relative">
                            <div class="flex items-center gap-3 w-full justify-between md:justify-end">
                                <div class="flex items-center gap-2 px-3 py-1.5 rounded-xl text-[11px] font-bold shadow-sm whitespace-nowrap ${isActive ? 'bg-slate-50 text-slate-600' : 'bg-slate-200 text-slate-400'}">
                                    <i data-lucide="calendar" class="w-3.5 h-3.5 opacity-70"></i>
                                    ${session.date}
                                </div>
                                <button onclick="event.stopPropagation(); showToast('Menu Opsi Sesi ${session.id}')" class="p-2 text-slate-400 hover:bg-slate-100 hover:text-slate-800 rounded-xl transition-all">
                                    <i data-lucide="more-vertical" class="w-5 h-5"></i>
                                </button>
                            </div>
                            
                            <button ${!isActive ? 'disabled' : ''} onclick="event.stopPropagation(); showToast('Kelola Session ${session.id}')" class="mt-4 md:mt-auto px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-[0.1em] transition-all flex items-center justify-center gap-2 active:scale-95 shadow-md ${isActive ? 'bg-[#004996] text-white hover:bg-blue-800 hover:-translate-y-0.5 hover:shadow-blue-900/20' : 'bg-slate-300 text-slate-500 cursor-not-allowed shadow-none'}">
                                Kelola Sesi <i data-lucide="chevron-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Re-initialize icons after rendering
            lucide.createIcons();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderSessions();
            lucide.createIcons();
        });

        // Toast System
        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            
            toastText.innerText = message;
            toast.classList.remove('translate-y-10', 'opacity-0', 'pointer-events-none');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0', 'pointer-events-none');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }
    </script>
</body>
</html>
